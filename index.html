<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>DEPTH 100</title>
<style>
  html,body{margin:0;padding:0;background:#0a0a10;overflow:hidden;height:100%;
    font-family:"Courier New",monospace;user-select:none;-webkit-user-select:none;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;background:#000;cursor:none;
    box-shadow:0 0 60px #0ff3,inset 0 0 0 2px #111;}
  canvas.cur{cursor:default;}

  /* ── Lobby (canvas-rendered, div is show/hide flag only) ── */
  #lobby{position:fixed;inset:0;pointer-events:none;z-index:10;}


</style>

<body>
<div id="wrap"><canvas id="cv" width="320" height="180"></canvas></div>

<!-- Lobby -->
<div id="lobby"></div>

<!-- Bullet time overlay -->

<!-- Pause -->
<div id="pause" style="display:none;position:fixed;inset:0;pointer-events:none;"></div>


<script>
(()=>{
'use strict';


// ═══════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════
const W=320,H=180,TILE=16,MAPW=64,MAPH=64,MAX_DEPTH=100;

const PERS_LIST=['prospector','sniper','bodyguard','berserker','moody'];
const PERS_LABEL={
  prospector:'PROSP',sniper:'SNIPER',bodyguard:'BDYGRD',berserker:'BSRKR',moody:'MOODY'
};
const PERS_ABILITY={
  prospector:'ITEM',sniper:'MAP',bodyguard:'EXIT',berserker:'ENEMY',moody:null
};

const P_PAL=[
  {name:'P1',body:'#3cf',dark:'#247',head:'#fda',trail:'#8ef'},
  {name:'P2',body:'#f66',dark:'#722',head:'#fda',trail:'#fa8'},
  {name:'P3',body:'#6c6',dark:'#272',head:'#fda',trail:'#af8'},
  {name:'P4',body:'#fc4',dark:'#751',head:'#fda',trail:'#fe8'},
];

// ═══════════════════════════════════════════════
//  SETUP
// ═══════════════════════════════════════════════
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;

const lobbyEl=document.getElementById('lobby');

function fit(){
  const s=Math.max(1,Math.floor(Math.min(window.innerWidth/W,window.innerHeight/H)));
  cv.style.width=(W*s)+'px'; cv.style.height=(H*s)+'px';
}
window.addEventListener('resize',fit); fit();


// ═══════════════════════════════════════════════
//  RAW INPUT
// ═══════════════════════════════════════════════
const keys={};
let paused=false,debug=false,introActive=false,introPage=0,introT=0;
const pauseEl=document.getElementById('pause');
function setPause(v){
  paused=v;
  cv.classList.toggle('cur',v); // show pointer cursor while paused
  if(!v)PSG.resume();
}
addEventListener('keydown',e=>{
  if(attractDemo){stopAttractDemo();e.preventDefault();return;}
  if(lobbyEl.style.display!=='none')lobbyIdleT=0;
  if(introActive){
    if(e.code==='Space'||e.code==='Enter'){
      introPage++;if(introPage>=INTRO_PAGES)introPage=INTRO_PAGES-1;introT=0;e.preventDefault();return;
    }
    if(e.code==='Escape'){endIntro();e.preventDefault();return;}
    return;
  }
  if(e.code==='Escape'&&running&&!gameWon){setPause(!paused);e.preventDefault();return;}
  if(e.code==='Tab'&&running&&!paused&&!gameOverState&&!gameWon){callCPU();e.preventDefault();return;}
  if((e.code==='Escape'||e.code==='KeyR')&&gameOverState){gameOverState=false;lobbyEl.style.display='flex';renderLobby();e.preventDefault();return;}
  if((e.code==='Escape'||e.code==='KeyR')&&gameWon){gameWon=false;lobbyEl.style.display='flex';renderLobby();e.preventDefault();return;}
  if(e.code==='F1'){debug=!debug;e.preventDefault();return;}
  if(debug&&running){
    if(e.code==='BracketRight'){nextStage();return;}        // ] next floor
    if(e.code==='BracketLeft'){stage=99;nextStage();return;} // [ jump to D100
    if(e.code==='Backslash'){if(fog)fog.fill(1);return;}   // \ reveal all
    if(e.code==='Equal'){coresCollected=coresNeeded;exitOpen=true;flash('ALL CORES','#ff0');return;} // = give cores
    if(e.code==='Semicolon'){enemies.length=0;flash('ENEMIES CLEARED','#f80');return;} // ; kill enemies
    if(e.code==='KeyM'){for(const p of players){p.hp=p.maxHp=9999;p.iframe=.5;}flash('GOD MODE','#f0f');return;} // M max HP
    if(e.code==='KeyB'){const b=makeBoss();const h=humanPlayer();if(h){b.x=h.x+80;b.y=h.y;}enemies.push(b);flash('★ BOSS SPAWNED','#f44');return;} // B spawn boss
  }
  keys[e.code]=true;
});
addEventListener('keyup',e=>keys[e.code]=false);
const mouse={x:W/2,y:H/2,down:false};
function updMouse(e){const r=cv.getBoundingClientRect();mouse.x=(e.clientX-r.left)*(W/r.width);mouse.y=(e.clientY-r.top)*(H/r.height);}
cv.addEventListener('mousemove',e=>{updMouse(e);if(lobbyEl.style.display!=='none')lobbyIdleT=0;});
cv.addEventListener('mousedown',e=>{updMouse(e);if(e.button===0)mouse.down=true;if(e.button===2)mouse.right=true;});
addEventListener('mouseup',e=>{if(e.button===0)mouse.down=false;if(e.button===2)mouse.right=false;});
cv.addEventListener('contextmenu',e=>e.preventDefault());
cv.addEventListener('click',e=>{
  if(attractDemo){stopAttractDemo();return;}
  if(lobbyEl.style.display!=='none')lobbyIdleT=0;
  if(introActive){
    // Page 3: BACK TO TITLE button hit test
    if(introPage===3){
      const bx=W/2-22,by=H-28,bw=44,bh=12;
      if(mouse.x>=bx&&mouse.x<=bx+bw&&mouse.y>=by&&mouse.y<=by+bh){endIntro();return;}
    }
    introPage++;
    if(introPage>=INTRO_PAGES){introPage=INTRO_PAGES-1;}
    introT=0;
    return;
  }
  if(lobbyEl.style.display!=='none'){lobbyHandleClick();return;}
  if(paused){pauseHandleClick();return;}
  if(gameOverState){goHandleClick();return;}
  if(gameWon){winHandleClick();return;}
});


// ═══════════════════════════════════════════════
//  CONTROLLERS
// ═══════════════════════════════════════════════
class KMController{
  constructor(){this.type='KB+M';this.label='KB+M';}
  move(p){
    if((keys.ShiftLeft||keys.ShiftRight)&&p){
      // Shift+mouse: move toward cursor
      const dx=mouse.x+camX-W/2-p.x,dy=mouse.y+camY-H/2-p.y;
      const d=Math.hypot(dx,dy);
      if(d<14)return{x:0,y:0};
      return{x:dx/d,y:dy/d};
    }
    return{x:(keys.KeyD?1:0)-(keys.KeyA?1:0),y:(keys.KeyS?1:0)-(keys.KeyW?1:0)};
  }
  aim(p){return Math.atan2(mouse.y+camY-H/2-p.y,mouse.x+camX-W/2-p.x);}
  fire(){return mouse.down;}
  charge(){return!!(mouse.right||keys.KeyE);}
  dash(){return!!(keys.Space||keys.KeyF);}
}
class PadController{
  constructor(){this.type='PAD';this.label='GAMEPAD';this._a=0;}
  _gp(){
    const gps=navigator.getGamepads?navigator.getGamepads():[];
    for(let i=0;i<gps.length;i++)if(gps[i]&&gps[i].axes.length>=2)return gps[i];
    return null;
  }
  move(){const g=this._gp();if(!g)return{x:0,y:0};const x=g.axes[0]||0,y=g.axes[1]||0;if(Math.hypot(x,y)<.18)return{x:0,y:0};return{x,y};}
  aim(p){const g=this._gp();if(!g)return this._a;const x=g.axes[2]||0,y=g.axes[3]||0;if(Math.hypot(x,y)>.3)this._a=Math.atan2(y,x);return this._a;}
  fire(){const g=this._gp();if(!g)return false;if(Math.hypot(g.axes[2]||0,g.axes[3]||0)>.6)return true;if(g.buttons[7]?.value>.5)return true;return!!g.buttons[0]?.pressed;}
  charge(){const g=this._gp();if(!g)return false;return!!(g.buttons[6]?.value>.5);}
  dash(){const g=this._gp();if(!g)return false;return!!(g.buttons[4]?.pressed||g.buttons[1]?.pressed);}
}

// ── CPU helper fns (use live arrays) ─────────
function randPers(noMoody=false){const l=noMoody?PERS_LIST.filter(x=>x!=='moody'):PERS_LIST;return l[Math.floor(Math.random()*l.length)];}
function nearEnemy(x,y){let b=null,d=Infinity;for(const e of enemies){const dd=(e.x-x)**2+(e.y-y)**2;if(dd<d){d=dd;b=e;}}return b;}
function farEnemy(x,y){let b=null,d=-1;for(const e of enemies){const dd=(e.x-x)**2+(e.y-y)**2;if(dd>d){d=dd;b=e;}}return b;}
function highHPEnemy(){let b=null,v=-1;for(const e of enemies){if(e.hp>v){v=e.hp;b=e;}}return b;}
function lowHPEnemy(){let b=null,v=Infinity;for(const e of enemies){if(e.hp<v){v=e.hp;b=e;}}return b;}
function nearItem(x,y){let b=null,d=Infinity;for(const c of cores){const dd=(c.x-x)**2+(c.y-y)**2;if(dd<d){d=dd;b=c;}}for(const p of pickups){const dd=(p.x-x)**2+(p.y-y)**2;if(dd<d){d=dd;b=p;}}return b;}
function humanPlayer(){return players.find(p=>p.isHuman&&p.alive)||players.find(p=>p.alive);}

class CPUController{
  constructor(pers){
    this.type='CPU';this.label='CPU';
    this.personality=pers||randPers();
    this._sub=randPers(true);
    this._rouletteDisplay=null;
    this._target=null;this._rT=0;this._strT=Math.random()*10;
    this._mx=0;this._my=0;this._aim=0;this._fire=false;this._dash=false;
  }
  get effPers(){return this.personality==='moody'?this._sub:this.personality;}
  get ability(){return PERS_ABILITY[this.effPers]||'?';}
  rerollMoody(){
    if(this.personality!=='moody')return;
    this._sub=randPers(true);
  }
  pre(p,dt){
    this._strT+=dt;
    // ── Rush to player when called ──
    if(p.rushing){
      const hp=humanPlayer();
      if(hp){
        const dx=hp.x-p.x,dy=hp.y-p.y,d=Math.hypot(dx,dy);
        if(d<30){p.rushing=false;}
        else{this._mx=dx/d;this._my=dy/d;this._fire=false;this._dash=d>60&&p.dashCd<=0&&Math.random()<.04;}
      }else{p.rushing=false;}
      return;
    }
    const ps=this.effPers,hp=humanPlayer();
    if(ps==='prospector'){this._preScav(p,dt,hp);return;}
    this._rT-=dt;
    if(this._rT<=0||!this._target||this._target.hp<=0){
      this._rT=0.3+Math.random()*.2;
      this._target=this._pickTarget(p,ps,hp);
    }
    if(!this._target){this._wander(p,hp);this._fire=false;return;}
    const dx=this._target.x-p.x,dy=this._target.y-p.y,d=Math.hypot(dx,dy)||1;
    this._aim=Math.atan2(dy,dx);
    this._move(p,ps,hp,d,this._wantDist(ps));
    const los=hasLoS(p.x,p.y,this._target.x,this._target.y);
    this._fire=d<this._fireRange(ps)&&los;
    this._dash=this._wantDash(p,ps,d);
  }
  _pickTarget(p,ps,hp){
    if(!enemies.length)return null;
    if(ps==='bodyguard')return hp?nearEnemy(hp.x,hp.y):nearEnemy(p.x,p.y);
    return nearEnemy(p.x,p.y);
  }
  _wantDist(ps){return{berserker:15,sniper:120,bodyguard:40}[ps]??55;}
  _fireRange(ps){return{sniper:160,berserker:80}[ps]??110;}
  _move(p,ps,hp,d,wd){
    let mx=0,my=0,a=this._aim;
    if(d>wd+10){mx=Math.cos(a);my=Math.sin(a);}
    else if(d<wd-10){mx=-Math.cos(a);my=-Math.sin(a);}
    const sa=a+Math.PI/2,sv=Math.sin(this._strT*2.3);
    mx+=Math.cos(sa)*sv*.4;my+=Math.sin(sa)*sv*.4;
    if(ps==='bodyguard'&&hp){const hdx=hp.x-p.x,hdy=hp.y-p.y,hd=Math.hypot(hdx,hdy);if(hd>55){mx=(mx+hdx/hd)/2;my=(my+hdy/hd)/2;}}
    const ml=Math.hypot(mx,my);if(ml>1){mx/=ml;my/=ml;}
    this._mx=mx;this._my=my;
  }
  _wantDash(p,ps,d){
    if(p.dashCd>0)return false;
    if(ps==='berserker'&&d>40&&Math.random()<.03)return true;
    return false;
  }
  _wander(p,hp){
    if(hp){const dx=hp.x-p.x,dy=hp.y-p.y,d=Math.hypot(dx,dy);if(d>45){this._mx=dx/d;this._my=dy/d;return;}}
    this._mx*=.9;this._my*=.9;
  }
  _preScav(p,dt,hp){
    const item=nearItem(p.x,p.y);
    if(item){
      const dx=item.x-p.x,dy=item.y-p.y,d=Math.hypot(dx,dy)||1;
      this._aim=Math.atan2(dy,dx);
      this._mx=d>20?dx/d:0;this._my=d>20?dy/d:0;
      const ne=nearEnemy(p.x,p.y);
      if(ne){const ed=Math.hypot(ne.x-p.x,ne.y-p.y);if(ed<50){this._aim=Math.atan2(ne.y-p.y,ne.x-p.x);this._fire=true;}else this._fire=false;}
    }else{
      const t=nearEnemy(p.x,p.y);this._target=t;
      if(t){const dx=t.x-p.x,dy=t.y-p.y,d=Math.hypot(dx,dy)||1;this._aim=Math.atan2(dy,dx);if(d>65){this._mx=Math.cos(this._aim);this._my=Math.sin(this._aim);}else if(d<45){this._mx=-Math.cos(this._aim);this._my=-Math.sin(this._aim);}else{this._mx=0;this._my=0;}this._fire=d<110;}
      else{this._wander(p,hp);this._fire=false;}
    }
    this._dash=false;
  }
  move(){return{x:this._mx,y:this._my};}
  aim(){return this._aim;}
  fire(){return this._fire;}
  dash(){return this._dash;}
  charge(){return false;}
  reload(){return false;}
}

// ═══════════════════════════════════════════════

//  WALL PALETTES (10 tiers, every 10 depths)
// ═══════════════════════════════════════════════
const WALL_PALETTES=[
  {base:'#3a3055',top:'#5a4a80',bot:'#1a1430',side:'#241c40',acc:'#7a64a8',f1:'#2a253a',f2:'#221d30',fd:'#3a3450'}, // 1-10  violet
  {base:'#1a2a4a',top:'#2a4a7a',bot:'#0a1428',side:'#141c38',acc:'#4a74c8',f1:'#161e30',f2:'#101825',fd:'#1e2e48'}, // 11-20 blue
  {base:'#0f3030',top:'#1a5050',bot:'#061a1a',side:'#0c2828',acc:'#2a9898',f1:'#0c2028',f2:'#081820',fd:'#103838'}, // 21-30 teal
  {base:'#3a2010',top:'#6a3c18',bot:'#1a0c06',side:'#2a1610',acc:'#a06030',f1:'#281808',f2:'#1e1206',fd:'#3a2818'}, // 31-40 brown
  {base:'#3a1a06',top:'#703010',bot:'#1a0800',side:'#2c1008',acc:'#d05820',f1:'#200c04',f2:'#280e04',fd:'#401804'}, // 41-50 volcanic
  {base:'#3a0808',top:'#6a1010',bot:'#1a0404',side:'#280808',acc:'#e02020',f1:'#200404',f2:'#180404',fd:'#2a0606'}, // 51-60 deep red
  {base:'#1a0a14',top:'#300a20',bot:'#0a0408',side:'#140810',acc:'#ff2060',f1:'#100408',f2:'#0c0306',fd:'#1c0812'}, // 61-70 hellfire
  {base:'#200a30',top:'#400a60',bot:'#100418',side:'#180828',acc:'#9030e0',f1:'#140818',f2:'#100610',fd:'#280a38'}, // 71-80 void purple
  {base:'#0a1e0a',top:'#103818',bot:'#040e04',side:'#081408',acc:'#30d030',f1:'#060e06',f2:'#040c04',fd:'#0c1e0c'}, // 81-90 bio
  {base:'#080808',top:'#181818',bot:'#020202',side:'#0c0c0c',acc:'#e0e0ff',f1:'#0a0a0a',f2:'#060606',fd:'#101010'}, // 91-99 void
];
function wallPal(){return WALL_PALETTES[Math.min(9,Math.floor((stage-1)/10))];}

// ═══════════════════════════════════════════════
//  WORLD
// ═══════════════════════════════════════════════
let map,fog,rooms_=[];
let cores=[],exits=[],pods=[],screwObj=null;
let exitOpen=false,coresNeeded=0,coresCollected=0;
let secretWallPos=null,secretWallHits=0,driverActive=false;

// ── Flow field for enemy navigation ──────────
const flowField=new Float32Array(MAPW*MAPH*2); // [dx,dy] per tile
const _ffParent=new Int32Array(MAPW*MAPH);
const _ffQueue=new Int32Array(MAPW*MAPH);
let _ffTx=-1,_ffTy=-1;
function buildFlowField(px,py){
  const tx=px/TILE|0,ty=py/TILE|0;
  if(tx===_ffTx&&ty===_ffTy)return; // same tile — no recompute needed
  _ffTx=tx;_ffTy=ty;
  _ffParent.fill(-1);
  // BFS from player tile outward
  let head=0,tail=0;
  const start=ty*MAPW+tx;
  _ffParent[start]=start;
  _ffQueue[tail++]=start;
  while(head<tail){
    const idx=_ffQueue[head++];
    const cx=idx%MAPW,cy=(idx/MAPW)|0;
    const nb=[cx-1+cy*MAPW,cx+1+cy*MAPW,cx+(cy-1)*MAPW,cx+(cy+1)*MAPW];
    const nx=[cx-1,cx+1,cx,cx],ny=[cy,cy,cy-1,cy+1];
    for(let k=0;k<4;k++){
      if(nx[k]<0||ny[k]<0||nx[k]>=MAPW||ny[k]>=MAPH)continue;
      const ni=nb[k];if(_ffParent[ni]!==-1)continue;
      if(map[ni]===1||map[ni]===4)continue; // wall
      _ffParent[ni]=idx;_ffQueue[tail++]=ni;
    }
  }
  // Build direction: each tile points one step toward player
  for(let i=0;i<MAPW*MAPH;i++){
    const p=_ffParent[i];
    if(p===-1||p===i){flowField[i*2]=0;flowField[i*2+1]=0;continue;}
    flowField[i*2]=(p%MAPW)-(i%MAPW);
    flowField[i*2+1]=((p/MAPW)|0)-((i/MAPW)|0);
  }
}

function genMap(){
  map=new Uint8Array(MAPW*MAPH); map.fill(1);

  // ── Monster House: open arena ──────────────
  if(monsterHouse){
    map.fill(0);
    // outer border walls
    for(let x=0;x<MAPW;x++){map[x]=1;map[(MAPH-1)*MAPW+x]=1;}
    for(let y=0;y<MAPH;y++){map[y*MAPW]=1;map[y*MAPW+MAPW-1]=1;}
    // random 2×2 pillars (avoid center 6×6)
    const mcx=MAPW>>1,mcy=MAPH>>1;
    for(let i=0;i<14+rndi(0,8);i++){
      const px=rndi(3,MAPW-5),py=rndi(3,MAPH-5);
      if(Math.abs(px-mcx)<5&&Math.abs(py-mcy)<5)continue;
      map[py*MAPW+px]=1;map[py*MAPW+px+1]=1;
      map[(py+1)*MAPW+px]=1;map[(py+1)*MAPW+px+1]=1;
    }
    // floor variation
    for(let i=0;i<map.length;i++){if(map[i]===0&&Math.random()<.06)map[i]=2;}
    rooms_=[{x:1,y:1,w:MAPW-2,h:MAPH-2,cx:mcx,cy:mcy}];
    const wcx=mcx*TILE+8,wcy=mcy*TILE+8;
    for(let i=0;i<players.length;i++){const a=(i/Math.max(1,players.length))*Math.PI*2;players[i].x=wcx+Math.cos(a)*10;players[i].y=wcy+Math.sin(a)*10;}
    exits=[{x:wcx,y:wcy}];
    // no cores — exit opens on enemy clear
    coresNeeded=0;coresCollected=0;exitOpen=false;cores=[];pods=[];screwObj=null;
    fog=new Uint8Array(MAPW*MAPH);fog.fill(1); // fully revealed
    return;
  }

  const rs=[];
  for(let i=0;i<24;i++){
    const w=rndi(6,12),h=rndi(5,10),x=rndi(1,MAPW-w-1),y=rndi(1,MAPH-h-1);
    rs.push({x,y,w,h,cx:x+(w>>1),cy:y+(h>>1)});
    for(let yy=y;yy<y+h;yy++)for(let xx=x;xx<x+w;xx++)map[yy*MAPW+xx]=0;
  }
  for(let i=1;i<rs.length;i++){
    let x=rs[i-1].cx,y=rs[i-1].cy;const b=rs[i];
    while(x!==b.cx){map[y*MAPW+x]=0;x+=(b.cx>x?1:-1);}
    while(y!==b.cy){map[y*MAPW+x]=0;y+=(b.cy>y?1:-1);}
  }
  for(let i=0;i<map.length;i++){if(map[i]===0){const r=Math.random();if(r<.05)map[i]=3;else if(r<.20)map[i]=2;}}
  rooms_=rs;
  // place players
  const r0=rs[0];const cx=r0.cx*TILE+8,cy=r0.cy*TILE+8;
  for(let i=0;i<players.length;i++){const a=(i/Math.max(1,players.length))*Math.PI*2;players[i].x=cx+Math.cos(a)*10;players[i].y=cy+Math.sin(a)*10;}
  // exit: farthest room
  let best=rs[0],bd=-1;
  for(const r of rs){const dx=r.cx*TILE-cx,dy=r.cy*TILE-cy,d=dx*dx+dy*dy;if(d>bd){bd=d;best=r;}}
  exits=[{x:best.cx*TILE+8,y:best.cy*TILE+8}];
  // cores (max 8)
  const nc=Math.min(8,Math.max(1,3+Math.ceil(stage/10)));
  coresNeeded=nc; coresCollected=0; exitOpen=false; cores=[];
  let placed=0,guard=0;
  while(placed<nc&&guard++<800){const r=rs[rndi(1,rs.length)];const tx=r.x+rndi(0,r.w),ty=r.y+rndi(0,r.h);const t=map[ty*MAPW+tx];if(t===0||t===2||t===3){cores.push({x:tx*TILE+8,y:ty*TILE+8,t:0});placed++;}}
  // cold sleep pods: every 10 floors, one pod
  pods=[];
  if(stage%10===0){
    let pg=0;while(pg++<200){const r=rs[rndi(1,rs.length)];const tx=r.x+rndi(0,r.w),ty=r.y+rndi(0,r.h);const t=map[ty*MAPW+tx];if(t===0||t===2||t===3){pods.push({x:tx*TILE+8,y:ty*TILE+8,t:0,used:false});break;}}
  }
  // DEPTH 100: screw
  screwObj=null;
  if(stage===MAX_DEPTH){screwObj={x:best.cx*TILE+8,y:best.cy*TILE+8-12,t:0};}
  // Secret wall (20% chance, not on boss/MH floors)
  secretWallPos=null;secretWallHits=0;_ffTx=-1;_ffTy=-1; // force flow field rebuild
  const isBossFloor=stage%10===0||stage===99;
  if(!isBossFloor&&!monsterHouse&&Math.random()<.20){
    for(let t=0;t<400;t++){
      const tx=rndi(2,MAPW-2),ty=rndi(2,MAPH-2);
      if(map[ty*MAPW+tx]!==1)continue;
      // needs at least one floor neighbor
      let hasFloor=false;
      for(let dy=-1;dy<=1&&!hasFloor;dy++)for(let dx=-1;dx<=1;dx++){const n=map[(ty+dy)*MAPW+(tx+dx)];if(n===0||n===2)hasFloor=true;}
      if(!hasFloor)continue;
      map[ty*MAPW+tx]=4;secretWallPos={tx,ty};break;
    }
  }
  // Fog of war — reveal spawn area
  fog=new Uint8Array(MAPW*MAPH);
  revealFog(r0.cx*TILE+8,r0.cy*TILE+8);
}

function revealFog(wx,wy){
  const tx=(wx/TILE)|0,ty=(wy/TILE)|0,R=7;
  for(let dy=-R;dy<=R;dy++)for(let dx=-R;dx<=R;dx++){
    if(dx*dx+dy*dy>R*R)continue;
    const x=tx+dx,y=ty+dy;
    if(x>=0&&x<MAPW&&y>=0&&y<MAPH)fog[y*MAPW+x]=1;
  }
}

// Offscreen canvas for minimap (putImageData ignores globalAlpha — use drawImage instead)
const _mmCv=document.createElement('canvas');
_mmCv.width=MAPW;_mmCv.height=MAPH;
const _mmCtx=_mmCv.getContext('2d');

function allyHasAbility(ab){
  return players.some(p=>!p.isHuman&&p.alive&&!p.controller._rouletteDisplay&&p.controller.ability===ab);
}

function drawMinimap(){
  if(!map||!fog)return;
  const MW=MAPW,MH=MAPH;
  const mx=W-MW-4,my=20;
  const hasMap=allyHasAbility('MAP');
  const hasItem=allyHasAbility('ITEM');
  const hasExit=allyHasAbility('EXIT');
  const hasEnemy=allyHasAbility('ENEMY');

  // Terrain — Sniper reveals full map
  const id=_mmCtx.createImageData(MW,MH);const d=id.data;
  for(let y=0;y<MAPH;y++)for(let x=0;x<MAPW;x++){
    if(!fog[y*MAPW+x]&&!hasMap)continue;
    const t=map[y*MAPW+x],i=(y*MW+x)*4;
    if(t===1){d[i]=80;d[i+1]=60;d[i+2]=120;d[i+3]=255;}
    else     {d[i]=55;d[i+1]=48;d[i+2]=80;d[i+3]=255;}
  }
  _mmCtx.putImageData(id,0,0);

  // EXIT — Bodyguard always shows exit
  if(exits[0]){
    const ex=(exits[0].x/TILE)|0,ey=(exits[0].y/TILE)|0;
    if(fog[ey*MAPW+ex]||hasExit){
      _mmCtx.fillStyle=exitOpen?'#ff0':'#665500';
      _mmCtx.fillRect(ex-1,ey-1,3,3);
    }
  }

  // CORES — Prospector always shows cores
  _mmCtx.fillStyle='#0ff';
  for(const c of cores){
    const cx_=(c.x/TILE)|0,cy_=(c.y/TILE)|0;
    if(fog[cy_*MAPW+cx_]||hasItem)_mmCtx.fillRect(cx_,cy_,2,2);
  }

  // ENEMIES — Berserker shows all enemy positions
  if(hasEnemy){
    _mmCtx.fillStyle='#f44';
    for(const e of enemies){
      const ex=(e.x/TILE)|0,ey=(e.y/TILE)|0;
      _mmCtx.fillRect(ex,ey,2,2);
    }
  }

  // Players
  for(const p of players){
    if(!p.alive)continue;
    const px=(p.x/TILE)|0,py=(p.y/TILE)|0;
    _mmCtx.fillStyle=p.pal.body;
    _mmCtx.fillRect(px-1,py-1,3,3);
  }

  ctx.globalAlpha=0.45;
  ctx.fillStyle='#000';
  ctx.fillRect(mx-1,my-1,MW+2,MH+2);
  ctx.globalAlpha=0.60;
  ctx.drawImage(_mmCv,mx,my);
  ctx.globalAlpha=1;
}

// Draw edge arrows for off-screen CPU allies
function drawOffscreenIndicators(){
  const PAD=10,CX=W/2,CY=H/2;
  for(const p of players){
    if(!p.alive||p.isHuman)continue;
    const sx=p.x-camX+CX,sy=p.y-camY+CY;
    if(sx>=PAD&&sx<=W-PAD&&sy>=PAD&&sy<=H-PAD)continue; // on-screen, skip
    const ang=Math.atan2(sy-CY,sx-CX);
    const c=Math.cos(ang),s=Math.sin(ang);
    // Intersect ray with screen rect to find edge point
    let ex,ey;
    const xr=(c>0?CX-PAD:-(CX-PAD)),yr=(s>0?CY-PAD:-(CY-PAD));
    if(s!==0&&Math.abs(xr*s/c)>=Math.abs(yr)){ex=CX+yr*c/s;ey=CY+yr;}
    else{ex=CX+xr;ey=CY+xr*s/c;}
    ex=Math.max(PAD,Math.min(W-PAD,ex));
    ey=Math.max(PAD,Math.min(H-PAD,ey));
    // Arrow triangle pointing toward the CPU
    ctx.save();
    ctx.translate(ex,ey);ctx.rotate(ang);
    ctx.globalAlpha=0.88;
    ctx.fillStyle=p.pal.body;
    ctx.beginPath();ctx.moveTo(7,0);ctx.lineTo(-4,-3.5);ctx.lineTo(-4,3.5);ctx.closePath();ctx.fill();
    // Tiny player color dot at arrow base
    ctx.fillStyle=p.pal.dark||p.pal.body;
    ctx.fillRect(-5,-1,3,2);
    ctx.globalAlpha=1;ctx.restore();
  }
}

function tileAt(x,y){const tx=(x/TILE)|0,ty=(y/TILE)|0;if(tx<0||ty<0||tx>=MAPW||ty>=MAPH)return 1;return map[ty*MAPW+tx];}
function solid(x,y){const t=tileAt(x,y);return t===1||t===4;}
function hitsWall(x,y,r){for(let a=0;a<8;a++){const t=a*Math.PI/4;if(solid(x+Math.cos(t)*r,y+Math.sin(t)*r))return true;}return solid(x,y);}
function hasLoS(x0,y0,x1,y1){const dx=x1-x0,dy=y1-y0,n=Math.ceil(Math.hypot(dx,dy)/4);for(let i=1;i<n;i++){const t=i/n;if(solid(x0+dx*t,y0+dy*t))return false;}return true;}

let players=[],enemies=[],bullets=[],ebullets=[],particles=[],pickups=[],messages=[];

function makePlayer(idx,ctrl,isHuman){

function eScale(){return 1+(stage-1)*.06;}
function makeEnemy(type,x,y){
  const sc=eScale();
  const b={type,x,y,vx:0,vy:0,atkCd:0,hit:0,ang:0,anim:Math.random()*10,_dead:false};
  if(type==='grunt') {b.hp=3*sc;b.spd=22+stage*.1;b.r=3;b.dmg=8*sc;}
  else if(type==='runner'){b.hp=2*sc;b.spd=42+stage*.15;b.r=2.5;b.dmg=6*sc;}
  else if(type==='brute') {b.hp=10*sc;b.spd=14+stage*.08;b.r=5;b.dmg=18*sc;}
  else if(type==='shooter'){b.hp=3*sc;b.spd=14+stage*.08;b.r=3;b.dmg=10*sc;b.range=70;}
  return b;
}
function makeZombie(p){
  const mult=1.5+Math.random()*.5;
  const basePers=p.controller?p.controller.effPers:null;
  const zm={type:'zombie',x:p.x,y:p.y,vx:0,vy:0,

    fireCd:0,

    dropCores:Math.floor(coresCollected*.05),

    _zombieAbility:basePers==='moody'?randPers(true):basePers,

  };
  // Announce zombie ability
  const ZOMBIE_TITLE={prospector:'CORE-EATER',sniper:'WALL-HACK',bodyguard:'GATEKEEPER',berserker:'BLOODHOUND',moody:'CHAOS'};
  flash(p.pal.name+': '+( ZOMBIE_TITLE[basePers]||'ZOMBIE'),'#f44');
  return zm;

function makeBoss(){
  const sc=eScale();
  const hp=Math.round(120*(1+stage*.09)*sc);
  let bx,by;
  for(let t=0;t<300;t++){
    const tx=rndi(2,MAPW-2),ty=rndi(2,MAPH-2);
    if(!map||map[ty*MAPW+tx]!==0)continue;
    const wx=tx*TILE+8,wy=ty*TILE+8;
    let minD=Infinity;
    for(const p of players){if(!p.alive)continue;const d=Math.hypot(p.x-wx,p.y-wy);if(d<minD)minD=d;}
    if(minD>180){bx=wx;by=wy;break;}
  }
  if(bx===undefined){bx=MAPW*TILE*.5;by=16;}
  return{type:'boss',x:bx,y:by,vx:0,vy:0,
    hp,_maxHp:hp,r:9,spd:22+stage*.25,
    dmg:Math.round(35*sc),atkCd:0,hit:0,ang:0,anim:0,_dead:false,breakCd:0,
    _phase2:false,_shootCd:0};
}

// ═══════════════════════════════════════════════
function rnd(a=1,b){if(b===undefined){b=a;a=0;}return a+Math.random()*(b-a);}
function rndi(a,b){return Math.floor(rnd(a,b));}
function chance(p){return Math.random()<p;}
function spark(x,y,c,n=6,sp=40){for(let i=0;i<n;i++){const a=rnd(0,Math.PI*2),s=rnd(sp*.3,sp);particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(.18,.5),c});}}
function blood(x,y){spark(x,y,'#c22',8,60);}
function smoke(x,y){for(let i=0;i<5;i++)particles.push({x,y,vx:rnd(-8,8),vy:rnd(-25,-5),life:rnd(.4,.9),c:'#445',sm:true});}
function flash(msg,c='#ff0'){messages.push({t:0,msg:(''+msg).toUpperCase(),c});}
function moveObj(o,dt){
  const nx=o.x+o.vx*dt; if(!hitsWall(nx,o.y,o.r))o.x=nx;
  const ny=o.y+o.vy*dt; if(!hitsWall(o.x,ny,o.r))o.y=ny;
  // Wall escape: if somehow embedded, push out
  if(solid(o.x,o.y)){
    for(let a=0;a<8;a++){const t=a*Math.PI/4;const ex=o.x+Math.cos(t)*TILE*.6,ey=o.y+Math.sin(t)*TILE*.6;if(!solid(ex,ey)){o.x=ex;o.y=ey;break;}}
  }
}
function spawnEnemy(type){
  for(let t=0;t<200;t++){
    const tx=rndi(2,MAPW-2),ty=rndi(2,MAPH-2),tile=map[ty*MAPW+tx];
    if(tile!==0&&tile!==2&&tile!==3)continue;
    const x=tx*TILE+8,y=ty*TILE+8;
    let minD=Infinity;
    for(const p of players){if(!p.alive)continue;const d=(x-p.x)**2+(y-p.y)**2;if(d<minD)minD=d;}
    if(minD<90*90||minD>260*260)continue;
    enemies.push(makeEnemy(type,x,y)); return;
  }
}

//  UPDATE
// ═══════════════════════════════════════════════
function updatePlayer(p,dt){
  if(!p.alive)return;
  if(p.controller.pre)p.controller.pre(p,dt);
  let{x:mx,y:my}=p.controller.move(p);
  const ml=Math.hypot(mx,my);if(ml>1){mx/=ml;my/=ml;}
  let spd=p.spd;
  p.dashCd=Math.max(0,p.dashCd-dt);p.dashT=Math.max(0,p.dashT-dt);
  const db=p.controller.dash(p);
  if(db&&!p.edge.dash&&p.dashCd<=0&&(mx||my)){p.dashT=.18;p.dashCd=1.2;p.iframe=Math.max(p.iframe,.18);smoke(p.x,p.y);}
  p.edge.dash=db;
  if(p.dashT>0)spd*=3.2;
  // Charge button (need early peek to apply speed penalty)
  const chB=p.controller.charge(p);
  if(chB&&p.dashT<=0)spd*=0.35;
  p.vx=mx*spd;p.vy=my*spd;
  moveObj(p,dt);
  p.aim=p.controller.aim(p);
  // Charge accumulation / release
  if(chB&&p.dashT<=0){p.chargeT+=dt;}
  else if(p.chargeT>0&&!chB){fireChargeShot(p,p.chargeT);p.chargeT=0;}
  p.fireCd=Math.max(0,p.fireCd-dt);
  // Normal fire: auto (hold), disabled while charging
  const fb=p.controller.fire(p);
  p.edge.fire=fb;
  if(!chB&&fb&&p.fireCd<=0){
    const w=p.weapon;
    const spread=p.level>=3?w.spread*.6:w.spread;
    const ox=Math.cos(p.aim)*5,oy=Math.sin(p.aim)*5;
    const dmg=(w.dmg+p.level*.4)*.25;
    const angles=driverActive?[p.aim-0.22,p.aim,p.aim+0.22]:[p.aim+rnd(-spread,spread)];
    for(const a of angles)bullets.push({x:p.x+ox,y:p.y+oy,vx:Math.cos(a)*w.spd,vy:Math.sin(a)*w.spd,life:w.range,dmg:dmg*(driverActive?.7:1),owner:p,trail:[]});
    p.fireCd=w.fireCd*(driverActive?1.15:1);p.muzzle=.08;
    shake=Math.max(shake,.8);
    p.vx-=Math.cos(p.aim)*7;p.vy-=Math.sin(p.aim)*7;
  }
  p.iframe=Math.max(0,p.iframe-dt);
  p.muzzle=Math.max(0,p.muzzle-dt);
}

function fireChargeShot(p,t){
  const MAX_CHARGE=1.5;
  const power=Math.min(1,t/MAX_CHARGE);
  const w=p.weapon;
  const r=1.5+power*12.5;        // bullet radius 1.5→14
  const dmg=(w.dmg+p.level*.4)*(1+power*10);  // 1x to 11x
  const spd=w.spd*(.65+power*.2);
  const range=w.range*(1.5+power*.8);
  const ox=Math.cos(p.aim)*5,oy=Math.sin(p.aim)*5;
  bullets.push({x:p.x+ox,y:p.y+oy,
    vx:Math.cos(p.aim)*spd,vy:Math.sin(p.aim)*spd,
    life:range,dmg,owner:p,trail:[],r,charge:true,power});
  p.muzzle=.2+power*.25;
  shake=Math.max(shake,2+power*5);
  spark(p.x+Math.cos(p.aim)*10,p.y+Math.sin(p.aim)*10,'#ff0',Math.round(6+power*12),110+power*130);
  spark(p.x+Math.cos(p.aim)*10,p.y+Math.sin(p.aim)*10,p.pal.trail,Math.round(4+power*6),80+power*80);
}

function update(dt){
  time+=dt;
  if(!running)return;
  callCooldown=Math.max(0,callCooldown-dt);
  callAggroTimer=Math.max(0,callAggroTimer-dt);
  // ── Gamepad Select → callCPU ──
  {const gps=navigator.getGamepads?navigator.getGamepads():[];for(const gp of gps){if(!gp)continue;const sel=!!gp.buttons[8]?.pressed;if(sel&&!_prevSel)callCPU();_prevSel=sel;break;}}

  // ── Bullet time ──
  let eff=dt;
  if(bulletTime){
    eff=dt*.07;
    bulletTime.timer-=dt;
    // Invincibility for all alive
    for(const p of players)if(p.alive)p.iframe=Math.max(p.iframe,.15);
    if(bulletTime.timer<=0){
      bulletTime=null;
    }
  }

  // ── Players ──
  for(const p of players){updatePlayer(p,eff);if(p.alive)revealFog(p.x,p.y);}
  // Update flow field when human player moves to a new tile
  {const _hpf=humanPlayer();if(_hpf)buildFlowField(_hpf.x,_hpf.y);}
  // soft player-player separation
  for(let i=0;i<players.length;i++)for(let j=i+1;j<players.length;j++){
    const a=players[i],b=players[j];if(!a.alive||!b.alive)continue;
    const dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy),mn=a.r+b.r;
    if(d>0&&d<mn){const push=(mn-d)*.5;a.x+=dx/d*push;a.y+=dy/d*push;b.x-=dx/d*push;b.y-=dy/d*push;}
  }

  // ── Enemy spawn ──
  spawnT-=eff;
  const maxE=Math.min(40,Math.floor(8+stage*.32));
  const spawnInterval=Math.max(.3,1.4-stage*.011);
  if(!monsterHouse&&spawnT<=0&&enemies.length<maxE){
    spawnT=spawnInterval;
    const r=Math.random();
    spawnEnemy(r<.45?'grunt':r<.75?'runner':r<.92?'shooter':'brute');
  }
  // ── Monster House clear check ──
  if(monsterHouse&&!monsterHouseCleared&&mhSpawnPending===0&&time>2&&enemies.length===0){
    monsterHouseCleared=true;exitOpen=true;
    const cx=(MAPW>>1)*TILE+8,cy=(MAPH>>1)*TILE+8;
    pickups.push({type:'revive',x:cx,y:cy,t:0});
    flash('!! CLEARED !!','#ff0');flash('★ REVIVE ITEM DROPPED ★','#fa0');
    shake=Math.max(shake,5);
    spark(cx,cy,'#ff0',24,160);spark(cx,cy,'#fff',12,100);
  }

  // ── Player bullets ──
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.trail.push({x:b.x,y:b.y});if(b.trail.length>5)b.trail.shift();
    b.x+=b.vx*eff;b.y+=b.vy*eff;b.life-=eff;
    if(b.life<=0||solid(b.x,b.y)){
      // Secret wall hit?
      const bTx=(b.x/TILE)|0,bTy=(b.y/TILE)|0;
      if(secretWallPos&&bTx===secretWallPos.tx&&bTy===secretWallPos.ty){
        secretWallHits++;
        SE.clang();
        spark(b.x,b.y,'#ffd700',6,70);
        if(secretWallHits>=25){
          // Destroy secret wall, drop driver
          map[secretWallPos.ty*MAPW+secretWallPos.tx]=0;
          driverActive=true;
          spark(bTx*TILE+8,bTy*TILE+8,'#ffd700',24,140);
          flash('DRIVER FOUND!','#ffd700');flash('3-WAY SHOT ACTIVE!','#ffd700');
          SE.driver();secretWallPos=null;
        }else{
          spark(b.x,b.y,'#ff8',2,50);
        }
      }else{spark(b.x,b.y,'#ff8',4,80);}
      bullets.splice(i,1);continue;
    }
    let hit=false;
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];const dx=e.x-b.x,dy=e.y-b.y;
      if(dx*dx+dy*dy<(e.r+(b.r||1.5))**2){
        e.hp-=b.dmg;e.hit=.1;e.vx+=b.vx*.05;e.vy+=b.vy*.05;
        blood(b.x,b.y);
        if(e.hp<=0){
          e._dead=true;enemies.splice(j,1);
          totalKills++;if(b.owner)b.owner.kills++;
          spark(e.x,e.y,'#c22',12,90);smoke(e.x,e.y);shake=Math.max(shake,2);
          // drops
          const healRate=stage>50?Math.max(.02,.12-(stage-50)*.002):.12;
          if(chance(.08))pickups.push({type:'core',x:e.x,y:e.y,t:0});
          if(chance(healRate))pickups.push({type:'health',x:e.x,y:e.y,t:0});
          // boss drops
          if(e.type==='boss'){
            for(let k=0;k<3;k++)pickups.push({type:'health',x:e.x+rnd(-16,16),y:e.y+rnd(-16,16),t:0});
            flash('★ BOSS SLAIN ★','#ff0');shake=Math.max(shake,5);
            if(driverActive){driverActive=false;flash('DRIVER EXPIRED','#888');}
            if(!attractDemo)PSG.play(stage); // revert to zone BGM
            // restore any devoured cores (partial refund)
            const refund=Math.min(coresNeeded-coresCollected,2);
            if(refund>0){coresCollected+=refund;flash('CORE RECOVERED +'+refund,'#0ff');}
          }
          // zombie drops bonus
          if(e.type==='zombie'){
            const xpDrop=e.dropXp||0;
            if(xpDrop>0&&b.owner){b.owner.xp+=xpDrop;flash('VENGEANCE +'+xpDrop+'XP','#ff0');}
            if(e.dropCores>0){coresCollected+=e.dropCores;flash('RECLAIMED +'+e.dropCores+' CORE','#0ff');}
          }
          if(b.owner){
            const xpg=e.type==='boss'?50:e.type==='brute'?6:e.type==='zombie'?8:e.type==='shooter'?3:2;
            b.owner.xp+=xpg;b.owner.accXp+=xpg;
            while(b.owner.xp>=b.owner.level*10){
              b.owner.xp-=b.owner.level*10;b.owner.level++;
              b.owner.maxHp+=10;b.owner.hp=Math.min(b.owner.maxHp,b.owner.hp+20);
              b.owner.weapon.dmg+=.5;
              flash(b.owner.pal.name+' LV.'+b.owner.level,b.owner.pal.body);
            }
          }
        }
        hit=true;bullets.splice(i,1);break;
      }
    }
  }

  // ── Enemy bullets ──
  for(let i=ebullets.length-1;i>=0;i--){
    const b=ebullets[i];b.x+=b.vx*eff;b.y+=b.vy*eff;b.life-=eff;
    if(b.life<=0||(solid(b.x,b.y)&&!b.wallpass)){spark(b.x,b.y,'#f8a',4,60);ebullets.splice(i,1);continue;}
    for(const p of players){
      if(!p.alive)continue;
      const dx=p.x-b.x,dy=p.y-b.y;
      if(dx*dx+dy*dy<(p.r+1.5)**2){ebullets.splice(i,1);damagePlayer(p,b.dmg);break;}
    }
  }

  // ── Enemy AI ──
  const _callHp=callAggroTimer>0?humanPlayer():null;
  for(const e of enemies){
    let tgt=null,td=Infinity;
    if(_callHp&&fog[(e.y/TILE|0)*MAPW+(e.x/TILE|0)]>0){tgt=_callHp;}
    else for(const p of players){if(!p.alive)continue;const d=(p.x-e.x)**2+(p.y-e.y)**2;if(d<td){td=d;tgt=p;}}
    if(!tgt){e.vx*=.9;e.vy*=.9;moveObj(e,eff);continue;}
    const dx=tgt.x-e.x,dy=tgt.y-e.y,d=Math.hypot(dx,dy)||1;
    e.ang=Math.atan2(dy,dx);e.atkCd=Math.max(0,e.atkCd-eff);e.hit=Math.max(0,e.hit-eff);e.anim+=eff;
    if(e.type==='shooter'){
      const s=e.spd,w=70;
      if(d<w-10){e.vx=-Math.cos(e.ang)*s;e.vy=-Math.sin(e.ang)*s;}
      else if(d>w+10){e.vx=Math.cos(e.ang)*s;e.vy=Math.sin(e.ang)*s;}
      else{e.vx*=.8;e.vy*=.8;}
      if(d<105&&e.atkCd<=0&&hasLoS(e.x,e.y,tgt.x,tgt.y)){
        ebullets.push({x:e.x,y:e.y,vx:Math.cos(e.ang+rnd(-.05,.05))*90,vy:Math.sin(e.ang+rnd(-.05,.05))*90,life:1.4,dmg:e.dmg});
        e.atkCd=1.4;spark(e.x,e.y,'#f88',3,40);
      }
    } else if(e.type==='zombie'){
      // ── CHAOS: switch ability periodically ──
      if(e.zombiePers==='moody'){
        e._chaosT=(e._chaosT||0)-eff;
        if(e._chaosT<=0){e._chaosT=2.5+Math.random()*2;e._zombieAbility=randPers(true);flash(e.fromName+'! '+e._zombieAbility.toUpperCase(),'#f44');}
      }
      const za=e._zombieAbility||'berserker';

      // ── CORE-EATER (prospector): target cores, eat them ──
      if(za==='prospector'){
        const core=cores.length?cores.reduce((b,c)=>Math.hypot(c.x-e.x,c.y-e.y)<Math.hypot(b.x-e.x,b.y-e.y)?c:b,cores[0]):null;
        if(core){
          const ca=Math.atan2(core.y-e.y,core.x-e.x);
          e.vx=Math.cos(ca)*e.spd;e.vy=Math.sin(ca)*e.spd;
          if(Math.hypot(core.x-e.x,core.y-e.y)<e.r+8){spark(core.x,core.y,'#f80',6,60);cores.splice(cores.indexOf(core),1);flash('CORE EATEN!','#f44');}
          e.fireCd=Math.max(0,(e.fireCd||0)-eff);
          if(d<110&&e.fireCd<=0&&hasLoS(e.x,e.y,tgt.x,tgt.y)){
            const a=Math.atan2(tgt.y-e.y,tgt.x-e.x)+rnd(-e.weapon.spread,e.weapon.spread);
            ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*e.weapon.spd,vy:Math.sin(a)*e.weapon.spd,life:e.weapon.range,dmg:e.weapon.dmg});
            e.fireCd=e.weapon.fireCd;spark(e.x,e.y,'#f80',2,30);
          }
          if(d<e.r+tgt.r+2&&e.atkCd<=0){damagePlayer(tgt,e.dmg);e.atkCd=.5;}
        } else {
          e.vx=Math.cos(e.ang)*e.spd;e.vy=Math.sin(e.ang)*e.spd;
          e.fireCd=Math.max(0,(e.fireCd||0)-eff);
          if(d<130&&e.fireCd<=0&&hasLoS(e.x,e.y,tgt.x,tgt.y)){
            const a=e.ang+rnd(-e.weapon.spread,e.weapon.spread);
            ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*e.weapon.spd,vy:Math.sin(a)*e.weapon.spd,life:e.weapon.range,dmg:e.weapon.dmg});
            e.fireCd=e.weapon.fireCd;spark(e.x,e.y,'#f80',2,30);
          }
          if(d<e.r+tgt.r+1&&e.atkCd<=0){damagePlayer(tgt,e.dmg);e.atkCd=.5;}
        }
      }
      // ── GATEKEEPER (bodyguard): move to exit, block it ──
      else if(za==='bodyguard'){
        const ex=exits[0];
        if(ex&&!e._gateReached){
          const da=Math.atan2(ex.y-e.y,ex.x-e.x);const dd=Math.hypot(ex.x-e.x,ex.y-e.y);
          if(dd>18){e.vx=Math.cos(da)*e.spd;e.vy=Math.sin(da)*e.spd;}
          else{e.vx*=.2;e.vy*=.2;e._gateReached=true;flash(e.fromName+' BLOCKS EXIT!','#f44');}
        } else if(e._gateReached){
          e.vx*=.1;e.vy*=.1;
          e.fireCd=Math.max(0,(e.fireCd||0)-eff);
          if(d<160&&e.fireCd<=0&&hasLoS(e.x,e.y,tgt.x,tgt.y)){
            const a=Math.atan2(tgt.y-e.y,tgt.x-e.x)+rnd(-.1,.1);
            ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*e.weapon.spd,vy:Math.sin(a)*e.weapon.spd,life:e.weapon.range,dmg:e.weapon.dmg});
            e.fireCd=e.weapon.fireCd;spark(e.x,e.y,'#f88',3,40);
          }
        }
        if(d<e.r+tgt.r+2&&e.atkCd<=0){damagePlayer(tgt,e.dmg*1.5);e.atkCd=.4;}
      }
      // ── WALL-HACK (sniper): wall-penetrating high-damage shots ──
      else if(za==='sniper'){
        if(d>80){e.vx=Math.cos(e.ang)*e.spd*.5;e.vy=Math.sin(e.ang)*e.spd*.5;}
        else{e.vx*=.8;e.vy*=.8;}
        e.fireCd=Math.max(0,(e.fireCd||0)-eff);
        if(d<240&&e.fireCd<=0){
          const a=Math.atan2(tgt.y-e.y,tgt.x-e.x);
          // wall-piercing: no moveObj collision, wallpass flag
          ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*180,vy:Math.sin(a)*180,life:2.2,dmg:e.weapon.dmg*2.8,wallpass:true});
          e.fireCd=2.2;spark(e.x,e.y,'#f00',6,80);shake=Math.max(shake,1.5);
        }
        if(d<e.r+tgt.r+1&&e.atkCd<=0){damagePlayer(tgt,e.dmg);e.atkCd=.5;}
      }
      // ── BLOODHOUND (berserker): 1.5x speed constant chase ──
      else {
        const s=e.spd*1.5;
        if(d>20){e.vx=Math.cos(e.ang)*s;e.vy=Math.sin(e.ang)*s;}
        else{e.vx*=.7;e.vy*=.7;}
        e.fireCd=Math.max(0,(e.fireCd||0)-eff);
        if(d<120&&e.fireCd<=0&&hasLoS(e.x,e.y,tgt.x,tgt.y)){
          const a=e.ang+rnd(-e.weapon.spread,e.weapon.spread);
          ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*e.weapon.spd,vy:Math.sin(a)*e.weapon.spd,life:e.weapon.range,dmg:e.weapon.dmg});
          e.fireCd=e.weapon.fireCd*.7;spark(e.x,e.y,'#f44',2,30);
        }
        if(d<e.r+tgt.r+1&&e.atkCd<=0){damagePlayer(tgt,e.dmg);e.atkCd=.4;e.vx-=Math.cos(e.ang)*40;e.vy-=Math.sin(e.ang)*40;}
      }
    } else if(e.type==='boss'){
      // ── Phase 2 trigger at 50% HP ──
      if(!e._phase2&&e.hp<e._maxHp*.5){
        e._phase2=true;
        flash('★ PHASE 2 ★','#f44');flash('ENRAGED!','#f80');
        shake=Math.max(shake,7);
      }
      const bSpd=e._phase2?e.spd*1.5:e.spd;
      e.vx=Math.cos(e.ang)*bSpd;e.vy=Math.sin(e.ang)*bSpd;
      // Break surrounding wall tiles
      e.breakCd=Math.max(0,(e.breakCd||0)-eff);
      const btx=(e.x/TILE)|0,bty=(e.y/TILE)|0;
      for(let dy2=-1;dy2<=1;dy2++)for(let dx2=-1;dx2<=1;dx2++){
        const nx=btx+dx2,ny=bty+dy2;
        if(nx<1||ny<1||nx>=MAPW-1||ny>=MAPH-1)continue;
        if(map[ny*MAPW+nx]===1){
          map[ny*MAPW+nx]=0;fog[ny*MAPW+nx]=1;
          if(e.breakCd<=0){spark(nx*TILE+8,ny*TILE+8,'#c84',6,65);e.breakCd=.1;shake=Math.max(shake,1.5);}
        }
      }
      // Devour cores — wider range in phase 2
      const coreEatR=e._phase2?e.r+28:e.r+8;
      for(let i=cores.length-1;i>=0;i--){const c=cores[i];if(Math.hypot(c.x-e.x,c.y-e.y)<coreEatR){spark(c.x,c.y,'#f80',4,40);cores.splice(i,1);if(e._phase2)flash('CORE DEVOURED!','#f44');}}
      for(let i=pickups.length-1;i>=0;i--){const pk=pickups[i];if(Math.hypot(pk.x-e.x,pk.y-e.y)<e.r+8){spark(pk.x,pk.y,'#622',3,30);pickups.splice(i,1);}}
      // Phase 2: spread shot burst
      if(e._phase2){
        e._shootCd=Math.max(0,(e._shootCd||0)-eff);
        if(e._shootCd<=0){
          for(let k=-2;k<=2;k++){const a=e.ang+k*.28;ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*115,vy:Math.sin(a)*115,life:1.6,dmg:e.dmg*.55});}
          e._shootCd=2.2;spark(e.x,e.y,'#f80',8,80);
        }
      }
      // Smash attack
      if(d<e.r+tgt.r+2&&e.atkCd<=0){damagePlayer(tgt,e.dmg);e.atkCd=1.0;shake=Math.max(shake,3);e.vx-=Math.cos(e.ang)*45;e.vy-=Math.sin(e.ang)*45;}
      // Direct position update (no wall check)
      e.x+=e.vx*eff;e.y+=e.vy*eff;
      e.x=Math.max(TILE,Math.min(MAPW*TILE-TILE,e.x));e.y=Math.max(TILE,Math.min(MAPH*TILE-TILE,e.y));
      e.hit=Math.max(0,e.hit-eff);e.anim+=eff;
      // boss pushes players away (boss itself doesn't move)
      for(const p of players){if(!p.alive)continue;const ox=p.x-e.x,oy=p.y-e.y,dd=Math.hypot(ox,oy),mn=e.r+p.r;if(dd>0&&dd<mn){const push=mn-dd;p.x+=ox/dd*push;p.y+=oy/dd*push;}}
      continue; // skip standard moveObj + enemy separation
    } else {
      e.vx=Math.cos(e.ang)*e.spd;e.vy=Math.sin(e.ang)*e.spd;
      if(hitsWall(e.x+e.vx*.05,e.y+e.vy*.05,e.r)){e.vx=Math.cos(e.ang+Math.PI/2)*e.spd*.6;e.vy=Math.sin(e.ang+Math.PI/2)*e.spd*.6;}
      if(d<e.r+tgt.r+1&&e.atkCd<=0){damagePlayer(tgt,e.dmg);e.atkCd=.7;e.vx-=Math.cos(e.ang)*55;e.vy-=Math.sin(e.ang)*55;}
    }
    // Flow field: redirect movement through corridors when no LoS
    if(!hasLoS(e.x,e.y,tgt.x,tgt.y)){
      const fi=((e.y/TILE|0)*MAPW+(e.x/TILE|0))*2;
      const fdx=flowField[fi],fdy=flowField[fi+1];
      if(fdx||fdy){const spd=Math.hypot(e.vx,e.vy)||e.spd;const fl=Math.hypot(fdx,fdy);e.vx=fdx/fl*spd;e.vy=fdy/fl*spd;}
    }
    moveObj(e,eff);
    // separation: enemy-enemy
    for(const o of enemies){if(o===e)continue;const ox=e.x-o.x,oy=e.y-o.y,dd=Math.hypot(ox,oy),mn=e.r+o.r;if(dd>0&&dd<mn){const push=(mn-dd)*.5;e.x+=ox/dd*push;e.y+=oy/dd*push;}}
    // separation: enemy-player (both directions)
    for(const p of players){if(!p.alive)continue;const ox=e.x-p.x,oy=e.y-p.y,dd=Math.hypot(ox,oy),mn=e.r+p.r;if(dd>0&&dd<mn){const push=(mn-dd)*.5;e.x+=ox/dd*push;e.y+=oy/dd*push;p.x-=ox/dd*push;p.y-=oy/dd*push;}}
  }

  // ── Pickups ──
  for(let i=pickups.length-1;i>=0;i--){
    const p=pickups[i];p.t+=eff;
    for(const pl of players){if(!pl.alive)continue;const dx=pl.x-p.x,dy=pl.y-p.y;
      if(dx*dx+dy*dy<36){
        if(p.type==='core'){coresCollected++;flash('CORE '+coresCollected+'/'+coresNeeded,'#0ff');}
        else if(p.type==='health'){pl.hp=Math.min(pl.maxHp,pl.hp+25);flash(pl.pal.name+' +25HP',pl.pal.body);}
        else if(p.type==='revive'){pl.hasRevive=true;flash(pl.pal.name+' GOT REVIVE!','#ff0');spark(pl.x,pl.y,'#ff0',12,100);}
        pickups.splice(i,1);break;
      }
    }
  }
  // World cores
  for(let i=cores.length-1;i>=0;i--){
    const c=cores[i];c.t+=eff;
    for(const pl of players){if(!pl.alive)continue;const dx=pl.x-c.x,dy=pl.y-c.y;
      if(dx*dx+dy*dy<64){cores.splice(i,1);coresCollected++;flash('CORE '+coresCollected+'/'+coresNeeded,'#0ff');break;}
    }
  }
  if(!exitOpen&&coresCollected>=coresNeeded){exitOpen=true;flash('EXIT ONLINE','#ff0');}

  // ── Cold sleep pods ──
  for(const pod of pods){
    if(pod.used)continue;
    pod.t+=eff;
    for(const pl of players){if(!pl.alive)continue;const dx=pl.x-pod.x,dy=pl.y-pod.y;
      if(dx*dx+dy*dy<64){
        const dead=players.find(p=>!p.alive&&!p.isHuman);
        if(dead){
          pod.used=true;
          dead.alive=true;dead.hp=dead.maxHp*.5;dead.iframe=1;
          dead.x=pod.x+rnd(-10,10);dead.y=pod.y+rnd(-10,10);
          const newPers=randPers();
          dead.controller=new CPUController(newPers);
          spark(pod.x,pod.y,'#0ff',16,80);
          flash('COLD SLEEP: '+dead.pal.name+' REVIVED','#0ff');
          flash(dead.pal.name+': '+PERS_LABEL[newPers],dead.pal.body);
        }
        break;
      }
    }
  }

  // ── Exit / Screw ──
  if(exitOpen&&exits[0]){
    const ex=exits[0];
    for(const pl of players){if(!pl.alive)continue;const dx=pl.x-ex.x,dy=pl.y-ex.y;
      if(dx*dx+dy*dy<80){
        if(stage===MAX_DEPTH){/* screw handled below */}
        else{nextStage();return;}
      }
    }
  }
  if(screwObj){
    screwObj.t+=eff;
    for(const pl of players){if(!pl.alive)continue;const dx=pl.x-screwObj.x,dy=pl.y-screwObj.y;
      if(dx*dx+dy*dy<64){gameCleared();return;}
    }
  }

  // ── Particles / messages ──
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx*eff;p.y+=p.vy*eff;p.vx*=.96;p.vy*=.96;if(p.sm)p.vy-=30*eff;p.life-=eff;if(p.life<=0)particles.splice(i,1);
  }
  for(let i=messages.length-1;i>=0;i--){messages[i].t+=dt;if(messages[i].t>2.2)messages.splice(i,1);}
  shake*=Math.pow(.001,dt);

  // ── Camera: follow human player only, with aim look-ahead ──
  const _fp=players.find(p=>p.alive&&p.isHuman)||players.find(p=>p.alive);
  if(_fp){
    const tx=_fp.x+Math.cos(_fp.aim)*14,ty=_fp.y+Math.sin(_fp.aim)*14;
    camX+=(tx-camX)*Math.min(1,dt*6);camY+=(ty-camY)*Math.min(1,dt*6);
  }

  // ── Game over ──
  const _goCheck=attractDemo?!players.some(p=>p.alive):!players.some(p=>p.alive&&p.isHuman);
  if(_goCheck){running=false;gameOver();}
}

function damagePlayer(p,d){
  if(p.iframe>0)return;
  p.hp-=d;p.iframe=.4;shake=Math.max(shake,2);blood(p.x,p.y);
  if(p.hp<=0){
    // Revive item auto-activates
    if(p.hasRevive){
      p.hp=Math.ceil(p.maxHp*.5);p.hasRevive=false;p.iframe=1.5;
      flash(p.pal.name+' REVIVED!','#ff0');
      spark(p.x,p.y,'#ff0',20,150);spark(p.x,p.y,'#fff',8,80);
      shake=Math.max(shake,3);return;
    }
    p.hp=0;p.alive=false;
    if(!p.isHuman){
      // trigger bullet time
      bulletTime={timer:3.5,victimName:p.pal.name,victimPal:p.pal};
      setTimeout(()=>{if(bulletTime)flash('ZOMBIE RISING','#f44');},500);
    }
    enemies.push(makeZombie(p));
    flash(p.pal.name+' TURNED!','#f44');
    spark(p.x,p.y,'#c22',20,120);
  }
}

function mhEnemyType(){
  const r=Math.random();
  if(stage>=60)return r<.25?'brute':r<.6?'shooter':'runner';
  if(stage>=30)return r<.3?'runner':r<.65?'shooter':'grunt';
  return r<.5?'grunt':r<.8?'runner':'shooter';
}
function spawnMH(){
  // Spawn enemy anywhere in open arena, away from center
  const cx=(MAPW>>1)*TILE+8,cy=(MAPH>>1)*TILE+8;
  for(let t=0;t<200;t++){
    const tx=rndi(2,MAPW-2),ty=rndi(2,MAPH-2);
    if(map[ty*MAPW+tx]!==0&&map[ty*MAPW+tx]!==2)continue;
    const wx=tx*TILE+8,wy=ty*TILE+8;
    if(Math.hypot(wx-cx,wy-cy)<60)continue;
    enemies.push(makeEnemy(mhEnemyType(),wx,wy));return;
  }
}

function nextStage(){
  const wasMH=monsterHouse;
  stage++;
  // Determine monster house for new stage
  const isBoss=stage%10===0||stage===99;
  monsterHouse=!isBoss&&stage>1&&!wasMH&&Math.random()<0.2;
  monsterHouseCleared=false;
  if(!attractDemo)PSG.play(stage);saveGame();
  // Re-roll moody sub-ability each floor
  const msgs=[];
  for(const p of players){
    if(!p.alive||p.isHuman)continue;
    if(p.controller.personality==='moody'){
      p.controller.rerollMoody();
      msgs.push(p.pal.name+' MOODY:'+p.controller.ability);
    }
  }
  bullets=[];ebullets=[];enemies=[];particles=[];pickups=[];messages=[];
  genMap();spawnT=.5;
  for(const p of players){if(!p.alive)continue;p.fireCd=0;p.iframe=1;}
  let cx=0,cy=0,n=0;for(const p of players){if(!p.alive)continue;cx+=p.x;cy+=p.y;n++;}
  if(n){camX=cx/n;camY=cy/n;}
  flash('DEPTH '+stage,stage===MAX_DEPTH?'#ff0':'#0ff');
  if(stage===MAX_DEPTH)flash('THE SCREW AWAITS','#ff0');
  if(secretWallPos)flash('DRIVER HIDDEN THIS FLOOR','#ffd700');
  setTimeout(()=>{for(const m of msgs)flash(m,'#fa0');},600);
  // Monster house: announce immediately, spawn after brief delay
  if(monsterHouse){
    flash('!! MONSTER HOUSE !!','#f44');
    flash('EXTERMINATE ALL','#f88');
    shake=Math.max(shake,4);
    setTimeout(()=>{
      if(!running)return;
      const count=Math.min(40,Math.round(20+stage*.2));
      mhSpawnPending=count;
      for(let i=0;i<count;i++)setTimeout(()=>{mhSpawnPending--;if(running&&!monsterHouseCleared)spawnMH();},200+i*120);
    },400);
  }
  // Spawn boss on multiples of 10 and D99
  if(stage%10===0||stage===99){
    setTimeout(()=>{
      if(!running)return;
      const b=makeBoss();enemies.push(b);
      flash('★ BOSS APPROACHES ★','#f44');
      flash('WALL-BREAKER INCOMING','#f88');
      shake=Math.max(shake,3);
      if(!attractDemo)PSG.boss(stage);
    },1200);
  }
}

function callCPU(){
  if(callCooldown>0||!running||paused)return;
  const hp=humanPlayer();if(!hp)return;
  let called=0;
  for(const p of players){if(!p.alive||p.isHuman)continue;p.rushing=true;called++;}
  if(!called){flash('NO ALLIES','#555');return;}
  callCooldown=60;callAggroTimer=8;
  flash('CALLING ALLIES!','#0ff');
  spark(hp.x,hp.y,'#0ff',16,110);
}
function gameOver(){
  PSG.stop();clearSave();
  gameOverState=true;
  gameOverMsg='DEPTH '+stage+' / KILLS '+totalKills;
}
function gameCleared(){
  PSG.stop();clearSave();running=false;gameWon=true;
  winMsg='DEPTH '+stage+' / KILLS '+totalKills+' / ALLIES '+players.filter(p=>p.alive&&!p.isHuman).length+' SURVIVED';
}


// ═══════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════
function draw(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  if(!map)return;
  ctx.save();
  const sx=(Math.random()-.5)*shake,sy=(Math.random()-.5)*shake;
  ctx.translate(Math.round(-camX+W/2+sx),Math.round(-camY+H/2+sy));

  const xr=((camX-W/2)/TILE)|0,yr=((camY-H/2)/TILE)|0;
  const x0=Math.max(0,xr-1),y0=Math.max(0,yr-1);
  const x1=Math.min(MAPW-1,xr+(W/TILE|0)+3),y1=Math.min(MAPH-1,yr+(H/TILE|0)+3);

  for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++){
    const t=map[y*MAPW+x],px=x*TILE,py=y*TILE;
    const wp=wallPal();
    if(t===1||t===4){
      ctx.fillStyle=wp.base;ctx.fillRect(px,py,TILE,TILE);
      ctx.fillStyle=wp.top;ctx.fillRect(px,py,TILE,3);
      ctx.fillStyle=wp.bot;ctx.fillRect(px,py+TILE-3,TILE,3);
      ctx.fillStyle=wp.side;ctx.fillRect(px+TILE-2,py+3,2,TILE-6);
      if(((x*7+y*13)&3)===0){ctx.fillStyle=wp.acc;ctx.fillRect(px+3,py+5,2,2);}
      // Secret wall: subtle gold glint that pulses
      if(t===4){const g=(Math.sin(time*3+x*.7+y*.5)+1)*.5;if(g>.7){ctx.fillStyle='#b8860b';ctx.fillRect(px+5,py+6,2,2);}}
    }else{
      ctx.fillStyle=((x+y)&1)?wp.f1:wp.f2;ctx.fillRect(px,py,TILE,TILE);
      if(t===2){ctx.fillStyle=wp.fd;ctx.fillRect(px+2,py+2,4,4);ctx.fillRect(px+10,py+9,3,3);}
      else if(t===3){ctx.fillStyle=wp.bot;ctx.fillRect(px+4,py+7,8,1);ctx.fillRect(px+6,py+8,4,1);}
      ctx.fillStyle=wp.f2;ctx.fillRect(px,py,1,1);
    }
  }

  // EXIT
  const ex=exits[0];
  if(ex){
    const pu=(Math.sin(time*6)+1)*.5;
    ctx.fillStyle=exitOpen?`rgb(${50+200*pu|0},${200+50*pu|0},80)`:'#552';ctx.fillRect(ex.x-7,ex.y-7,14,14);
    ctx.fillStyle=exitOpen?'#ff0':'#332';ctx.fillRect(ex.x-5,ex.y-5,10,10);
    ctx.fillStyle='#000';ctx.fillRect(ex.x-1,ex.y-3,2,6);ctx.fillRect(ex.x-2,ex.y-2,1,1);ctx.fillRect(ex.x+1,ex.y-2,1,1);
  }

  // SCREW (DEPTH 100)
  if(screwObj){
    const pulse=(Math.sin(time*8)+1)*.5;
    ctx.fillStyle='#ff0';ctx.globalAlpha=.6+pulse*.4;
    ctx.fillRect(screwObj.x-4,screwObj.y-4,8,8);
    ctx.fillStyle='#fff';ctx.fillRect(screwObj.x-2,screwObj.y-2,4,4);
    ctx.fillStyle='#000';ctx.fillRect(screwObj.x-1,screwObj.y,2,1);ctx.fillRect(screwObj.x,screwObj.y-1,1,2);
    ctx.globalAlpha=1;
    pixText('SCREW',(screwObj.x-10)|0,(screwObj.y-12)|0,'#ff0');
  }

  // COLD SLEEP POD
  for(const pod of pods){
    if(pod.used)continue;pod.t=(pod.t||0);
    const f=(Math.sin(pod.t*3)+1)*.5;
    ctx.fillStyle='#0af';ctx.globalAlpha=.5+f*.5;
    ctx.fillRect(pod.x-5,pod.y-7,10,14);
    ctx.fillStyle='#8ff';ctx.fillRect(pod.x-3,pod.y-5,6,10);
    ctx.fillStyle='#fff';ctx.fillRect(pod.x-1,pod.y-3,2,6);ctx.fillRect(pod.x-3,pod.y-1,6,2);
    ctx.globalAlpha=1;
    pixText('POD',(pod.x-6)|0,(pod.y-14)|0,'#0af');
  }

  // World cores
  for(const c of cores){
    const f=(Math.sin(c.t*4+(c.x+c.y)*.1)+1)*.5;
    ctx.fillStyle='#066';ctx.fillRect(c.x-3,c.y-3+f,6,6);
    ctx.fillStyle='#0ff';ctx.fillRect(c.x-2,c.y-2+f,4,4);
    ctx.fillStyle='#fff';ctx.fillRect(c.x-1,c.y-1+f,1,1);
  }

  // Dropped pickups
  for(const p of pickups){
    const yo=Math.sin(p.t*5+p.x)*1;
    if(p.type==='core'){ctx.fillStyle='#0ff';ctx.fillRect(p.x-2,p.y-2+yo,4,4);ctx.fillStyle='#fff';ctx.fillRect(p.x-1,p.y-1+yo,1,1);}
    else if(p.type==='health'){ctx.fillStyle='#0f4';ctx.fillRect(p.x-2,p.y-1+yo,4,2);ctx.fillRect(p.x-1,p.y-2+yo,2,4);}
    else if(p.type==='revive'){
      const pulse=Math.abs(Math.sin(time*4));
      ctx.fillStyle='#ff0';ctx.globalAlpha=0.5+pulse*0.5;
      // star shape
      ctx.fillRect(p.x-3,p.y-1+yo,6,2);ctx.fillRect(p.x-1,p.y-3+yo,2,6);
      ctx.fillRect(p.x-2,p.y-2+yo,1,1);ctx.fillRect(p.x+1,p.y-2+yo,1,1);
      ctx.fillRect(p.x-2,p.y+1+yo,1,1);ctx.fillRect(p.x+1,p.y+1+yo,1,1);
      ctx.globalAlpha=1;ctx.fillStyle='#fff';ctx.fillRect(p.x-1,p.y-1+yo,2,2);
    }
  }

  // Smoke
  for(const p of particles){if(!p.sm)continue;ctx.fillStyle=p.c;ctx.globalAlpha=Math.max(0,p.life/.8)*.6;ctx.fillRect(p.x|0,p.y|0,2,2);}
  ctx.globalAlpha=1;

  // Player bullets
  for(const b of bullets){
    const trC=b.owner?b.owner.pal.trail:'#fb4';
    const trW=b.charge?Math.max(2,Math.ceil((b.r||1.5)*.6)):1;
    for(let i=0;i<b.trail.length;i++){ctx.globalAlpha=(i+1)/b.trail.length*.7;ctx.fillStyle=trC;ctx.fillRect(b.trail[i].x|0,b.trail[i].y|0,trW,trW);}
    ctx.globalAlpha=1;
    if(b.charge){
      const sz=Math.max(2,Math.ceil(b.r||1.5)),bx2=(b.x|0)-sz,by2=(b.y|0)-sz,bs=sz*2;
      const pw=b.power||0;
      ctx.globalAlpha=0.35;ctx.fillStyle='#ff0';ctx.fillRect(bx2-1,by2-1,bs+2,bs+2);
      ctx.globalAlpha=1;ctx.fillStyle=pw<0.5?'#ff8':'#f80';ctx.fillRect(bx2,by2,bs,bs);
      ctx.fillStyle='#fff';ctx.fillRect((b.x|0)-1,(b.y|0)-1,2,2);
    } else {
      ctx.fillStyle='#ffe';ctx.fillRect((b.x|0)-1,(b.y|0)-1,2,2);
    }
  }
  // Enemy bullets
  for(const b of ebullets){
    if(b.wallpass){ctx.fillStyle='#fff';ctx.fillRect((b.x|0)-2,(b.y|0)-2,4,4);ctx.fillStyle='#f0f';ctx.fillRect((b.x|0)-1,(b.y|0)-1,2,2);}
    else{ctx.fillStyle='#f44';ctx.fillRect((b.x|0)-1,(b.y|0)-1,2,2);ctx.fillStyle='#fa6';ctx.fillRect(b.x|0,b.y|0,1,1);}
  }

  for(const e of enemies)drawEnemy(e);
  for(const p of players)if(p.alive)drawPlayer(p);

  // Sparks
  for(const p of particles){if(p.sm)continue;ctx.fillStyle=p.c;ctx.globalAlpha=Math.max(0,p.life/.5);ctx.fillRect(p.x|0,p.y|0,2,2);}
  ctx.globalAlpha=1;

  // Crosshair (KB+M player)
  const kmp=players.find(p=>p.alive&&p.controller?.type==='KB+M');
  if(kmp){const x=Math.round(mouse.x+camX-W/2),y=Math.round(mouse.y+camY-H/2);ctx.fillStyle='#fff';ctx.fillRect(x-3,y,2,1);ctx.fillRect(x+2,y,2,1);ctx.fillRect(x,y-3,1,2);ctx.fillRect(x,y+2,1,2);ctx.fillStyle='#f44';ctx.fillRect(x,y,1,1);}

  ctx.restore();

  drawOffscreenIndicators();
  drawMinimap();
  drawHUD();

  // Bullet time colour grading
  if(bulletTime){
    const g=ctx.createRadialGradient(W/2,H/2,10,W/2,H/2,140);
    g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(200,0,0,.35)');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  }

  // Pause dim
  if(paused){ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(0,0,W,H);}

  // Scanlines
  ctx.fillStyle='#000';ctx.globalAlpha=.18;
  for(let y=0;y<H;y+=2)ctx.fillRect(0,y,W,1);
  ctx.globalAlpha=1;
}

function drawPlayer(p){
  const x=Math.round(p.x),y=Math.round(p.y),a=p.aim||0;
  ctx.fillStyle='#000';ctx.globalAlpha=.4;ctx.fillRect(x-3,y+2,6,2);ctx.globalAlpha=1;
  let bc=p.pal.body;
  if(p.iframe>0&&((time*30)|0)%2===0)bc='#fff';
  ctx.fillStyle=bc;ctx.fillRect(x-2,y-3,4,6);
  ctx.fillStyle=p.pal.head;ctx.fillRect(x-2,y-5,4,3);
  ctx.fillStyle='#000';ctx.fillRect(x-1,y-4,1,1);ctx.fillRect(x,y-4,1,1);
  const moving=(p.vx*p.vx+p.vy*p.vy)>2,bob=moving?((time*16+p.idx*3)|0)%2:0;
  ctx.fillStyle=p.pal.dark;ctx.fillRect(x-2,y+3,1,2-bob);ctx.fillRect(x+1,y+3,1,1+bob);
  const gx=x+Math.cos(a)*3,gy=y+Math.sin(a)*3;
  ctx.fillStyle='#aaa';
  for(let i=0;i<5;i++){ctx.fillRect(Math.round(gx+Math.cos(a)*i),Math.round(gy+Math.sin(a)*i),1,1);}
  if(p.muzzle>0){const mx=gx+Math.cos(a)*5,my=gy+Math.sin(a)*5;ctx.fillStyle='#ffb';ctx.fillRect(Math.round(mx)-1,Math.round(my)-1,3,3);ctx.fillStyle='#fff';ctx.fillRect(Math.round(mx),Math.round(my),1,1);}
  // Charge aura
  if(p.chargeT>0.05){
    const pw=Math.min(1,p.chargeT/1.5);
    const rad=Math.round(3+pw*8);
    const cc=pw<0.4?'#ff8':pw<0.8?'#f80':'#f44';
    ctx.fillStyle=cc;ctx.globalAlpha=0.35+pw*0.55;
    ctx.fillRect(x-rad-1,y-1,2,2);ctx.fillRect(x+rad,y-1,2,2);
    ctx.fillRect(x-1,y-rad-1,2,2);ctx.fillRect(x-1,y+rad,2,2);
    if(rad>=5){const d=Math.round(rad*.7);
      ctx.fillRect(x-d-1,y-d-1,2,2);ctx.fillRect(x+d,y-d-1,2,2);
      ctx.fillRect(x-d-1,y+d,2,2);ctx.fillRect(x+d,y+d,2,2);}
    ctx.globalAlpha=1;
  }
  // Name tag (MP only)
  if(players.length>1)pixText(p.pal.name,x-4,y-12,p.pal.body);
}

function drawEnemy(e){
  const x=Math.round(e.x),y=Math.round(e.y);
  // ── Boss ────────────────────────────────────
  if(e.type==='boss'){
    const pulse=Math.abs(Math.sin(time*5));
    const bc=e.hit>0?'#fff':'#622',hc=e.hit>0?'#fff':'#411';
    // Shadow
    ctx.fillStyle='#000';ctx.globalAlpha=.45;ctx.fillRect(x-10,y+8,20,4);ctx.globalAlpha=1;
    // Fists
    ctx.fillStyle=bc;ctx.fillRect(x-13,y-4,5,5);ctx.fillRect(x+8,y-4,5,5);
    // Body
    ctx.fillStyle=bc;ctx.fillRect(x-6,y-6,12,14);
    // Belt stripe
    ctx.fillStyle=e.hit>0?'#fff':'#833';ctx.fillRect(x-6,y+1,12,2);
    // Head
    ctx.fillStyle=hc;ctx.fillRect(x-5,y-11,10,6);
    // Eyes glow
    ctx.fillStyle='#f00';ctx.globalAlpha=.6+pulse*.4;
    ctx.fillRect(x-4,y-9,3,2);ctx.fillRect(x+1,y-9,3,2);
    ctx.globalAlpha=1;
    // Legs animate
    const lb=((time*7)|0)%2;
    ctx.fillStyle=e.hit>0?'#fff':'#400';
    ctx.fillRect(x-5,y+8,4,4-lb);ctx.fillRect(x+1,y+8,4,3+lb);
    // Name + HP bar
    ctx.globalAlpha=.9;pixText('BOSS',x-8,y-18,'#f44');ctx.globalAlpha=1;
    const bpw=28;ctx.fillStyle='#400';ctx.fillRect(x-(bpw>>1),y-21,bpw,2);
    ctx.fillStyle=e.hit>0?'#ff0':'#f44';ctx.fillRect(x-(bpw>>1),y-21,(bpw*e.hp/e._maxHp)|0,2);
    return;
  }
  ctx.fillStyle='#000';ctx.globalAlpha=.4;ctx.fillRect(x-e.r,y+e.r-1,e.r*2,2);ctx.globalAlpha=1;
  let body,head;
  if(e.type==='grunt'){body='#494';head='#7a7';}
  else if(e.type==='runner'){body='#963';head='#c85';}
  else if(e.type==='brute'){body='#722';head='#a44';}
  else if(e.type==='shooter'){body='#549';head='#86c';}
  else if(e.type==='zombie'){body=e.pal.body;head='#9a8';}
  if(e.hit>0){body='#fff';head='#fff';}
  if(e.type==='brute'){ctx.fillStyle=body;ctx.fillRect(x-4,y-4,8,7);ctx.fillStyle=head;ctx.fillRect(x-3,y-6,6,3);ctx.fillStyle='#f00';ctx.fillRect(x-2,y-5,1,1);ctx.fillRect(x+1,y-5,1,1);}
  else if(e.type==='shooter'){
    ctx.fillStyle=body;ctx.fillRect(x-2,y-3,4,6);ctx.fillStyle=head;ctx.fillRect(x-2,y-5,4,3);
    ctx.fillStyle='#ff0';ctx.fillRect(x-1,y-4,1,1);ctx.fillRect(x,y-4,1,1);
    ctx.fillStyle='#aaa';for(let i=0;i<3;i++)ctx.fillRect(Math.round(x+Math.cos(e.ang)*(3+i)),Math.round(y+Math.sin(e.ang)*(3+i)),1,1);
  } else if(e.type==='zombie'){
    ctx.fillStyle=body;ctx.fillRect(x-2,y-3,4,6);
    ctx.fillStyle=e.pal.dark;ctx.fillRect(x-2,y+2,1,1);ctx.fillRect(x+1,y+1,1,2);
    ctx.fillStyle=head;ctx.fillRect(x-2,y-5,4,3);
    ctx.fillStyle='#f00';ctx.fillRect(x-1,y-4,1,1);ctx.fillRect(x,y-4,1,1);
    if(((time*4+e.x)|0)%3===0){ctx.fillStyle='#800';ctx.fillRect(x-1,y-2,1,1);}
    ctx.fillStyle=e.pal.dark;ctx.fillRect(x-2,y+3,1,2);ctx.fillRect(x+1,y+3,1,2);
    ctx.fillStyle='#666';for(let i=0;i<4;i++)ctx.fillRect(Math.round(x+Math.cos(e.ang)*(3+i)),Math.round(y+Math.sin(e.ang)*(3+i)),1,1);
    ctx.globalAlpha=.7;pixText(e.fromName,x-4,y-13,'#a44');ctx.globalAlpha=1;
  } else {
    ctx.fillStyle=body;ctx.fillRect(x-2,y-2,4,5);ctx.fillStyle=head;ctx.fillRect(x-2,y-4,4,3);
    ctx.fillStyle='#f00';ctx.fillRect(x-1,y-3,1,1);ctx.fillRect(x,y-3,1,1);
    const reach=Math.sin(e.anim*8);ctx.fillStyle=body;ctx.fillRect(x-3,y-1+reach,1,2);ctx.fillRect(x+2,y-1-reach,1,2);
  }
}

// ── HUD ──────────────────────────────────────
function drawHUD(){
  // Depth progress bar (top)
  ctx.fillStyle='#111';ctx.fillRect(0,0,W,4);
  ctx.fillStyle=stage===MAX_DEPTH?'#ff0':'#0af';
  ctx.fillRect(0,0,(W*stage/MAX_DEPTH)|0,4);
  ctx.fillStyle='#0ff';ctx.fillRect((W*stage/MAX_DEPTH)|0,1,1,2);
  // Monster house banner
  if(monsterHouse&&!monsterHouseCleared){
    const rem=enemies.length;
    const pulse=Math.abs(Math.sin(time*4))*.3;
    ctx.fillStyle='#f00';ctx.globalAlpha=0.12+pulse;ctx.fillRect(0,4,W,10);ctx.globalAlpha=1;
    const mhStr='!! MONSTER HOUSE !!  REMAIN: '+rem;
    pixText(mhStr,(W-mhStr.length*4)>>1,6,'#f44');
  }
  // Boss HP bar (when boss alive)
  const _boss=running?enemies.find(e=>e.type==='boss'):null;
  if(_boss){
    const bw=100;const bx2=(W-bw)>>1;
    ctx.fillStyle='#300';ctx.fillRect(bx2,5,bw,4);
    ctx.fillStyle=_boss.hit>0?'#ff0':'#f44';ctx.fillRect(bx2,5,(bw*_boss.hp/_boss._maxHp)|0,4);
    pixText('★BOSS',bx2-22,5,'#f44');
    const pct=Math.round(100*_boss.hp/_boss._maxHp);
    pixText(pct+'%',bx2+bw+2,5,'#f88');
  }

  // Bottom bar
  ctx.fillStyle='#000c';ctx.fillRect(0,H-22,W,22);
  ctx.fillStyle='#0ff';ctx.fillRect(0,H-22,W,1);

  const n=Math.max(1,players.length),sw=Math.floor(W/n);
  for(let i=0;i<players.length;i++){
    const p=players[i],sx=i*sw+2;
    const nc=p.alive?p.pal.body:'#555';
    // Row 1: name + personality label side by side
    const persLabel=p.isHuman?'':( p.controller._rouletteDisplay || PERS_LABEL[p.controller.personality] || '');
    pixText(p.pal.name,sx,H-22+2,nc);
    if(persLabel)pixText(persLabel,sx+p.pal.name.length*4+2,H-22+2,p.alive?p.pal.body:'#555');
    if(!p.alive){pixText('ZOMBIE',sx,H-22+10,'#f44');continue;}
    // HP bar
    const hw=sw-6;ctx.fillStyle='#400';ctx.fillRect(sx,H-22+8,hw,3);
    ctx.fillStyle=p.hp<p.maxHp*.3?'#f44':'#4c4';ctx.fillRect(sx,H-22+8,(hw*p.hp/p.maxHp)|0,3);
    // Row 2: LV + ability badge
    pixText('LV'+p.level,sx,H-22+13,'#cfc');
    if(!p.isHuman&&!p.controller._rouletteDisplay){
      const abilBadge=p.controller.ability;
      pixText(abilBadge,sx+('LV'+p.level).length*4+2,H-22+13,'#ff0');
    }
    // Dash cd dot
    ctx.fillStyle=p.dashCd<=0?'#0ff':'#334';ctx.fillRect(sx+sw-8,H-22+2,2,2);
    // Revive star
    if(p.hasRevive){ctx.fillStyle='#ff0';ctx.fillRect(sx+sw-8,H-22+6,2,2);pixText('★',sx+sw-14,H-22+5,'#ff0');}
    if(p.isHuman&&driverActive){pixText('DRV',sx,H-22+6,'#ffd700');}
    if(p.isHuman&&callCooldown>0){pixText('CALL:'+Math.ceil(callCooldown)+'s',driverActive?sx+16:sx,H-22+6,'#446');}
  }

  // Stage / cores (top-right, below progress bar)
  const stageStr=stage+'/'+MAX_DEPTH,coreStr=coresCollected+'/'+coresNeeded;
  pixText('D'+stageStr,W-4-(stageStr.length+1)*4,6,'#0ff');
  pixText(exitOpen?'EXIT!':coreStr,W-4-coreStr.length*4,14,exitOpen?'#ff0':'#8cf');

  // Messages
  const maxMsg=Math.min(messages.length,5);
  for(let i=0;i<maxMsg;i++){
    const m=messages[i],a=m.t<1.5?1:Math.max(0,(2.2-m.t)/.7);
    ctx.globalAlpha=a;
    pixText(m.msg,(W-m.msg.length*4)>>1,20+i*7,m.c);
  }
  ctx.globalAlpha=1;

  if(exitOpen&&stage!==MAX_DEPTH)pixText('REACH EXIT >>',W/2-(13*4)/2,H-28,'#ff0');
  if(stage===MAX_DEPTH&&exitOpen)pixText('FIND THE SCREW!',W/2-(15*4)/2,H-28,'#ff0');

  // ── Debug overlay ─────────────────────────
  if(!debug||!running)return;
  const dl=[
    '[DEBUG MODE]  F1:off',
    'STAGE: '+stage+'/'+MAX_DEPTH+(stage===MAX_DEPTH?' ← FINAL':''),
    'ENEMIES: '+enemies.length,
    'CORES: '+coresCollected+'/'+coresNeeded+(exitOpen?' OPEN':''),
    'SCREW: '+(screwObj?'x'+((screwObj.x/TILE)|0)+' y'+((screwObj.y/TILE)|0):'none (not D100)'),
    'EXIT:  x'+((exits[0]?exits[0].x/TILE|0:'?'))+' y'+((exits[0]?exits[0].y/TILE|0:'?')),
    'P1:    x'+((players[0]?players[0].x/TILE|0:'?'))+' y'+((players[0]?players[0].y/TILE|0:'?')),
    '─────────────────',
    '] NEXT FLOOR',
    '[ JUMP TO D100',
    '\\ REVEAL ALL',
    '= GIVE ALL CORES',
    '; KILL ENEMIES',
  ];
  const pw=dl.reduce((m,s)=>Math.max(m,s.length),0)*4+6;
  const ph=dl.length*7+6;
  ctx.globalAlpha=0.82;ctx.fillStyle='#000';ctx.fillRect(2,22,pw,ph);
  ctx.globalAlpha=1;ctx.fillStyle='#111';ctx.fillRect(2,22,pw,1);
  for(let i=0;i<dl.length;i++){
    const c=dl[i].startsWith('[')?'#f80':dl[i].startsWith('─')?'#333':'#8fc';
    pixText(dl[i],5,25+i*7,c);
  }
}

// ── Pixel font ───────────────────────────────
const FONT={

};
function pixText(str,x,y,c='#fff'){
  ctx.fillStyle=c;str=(''+str).toUpperCase();
  for(let i=0;i<str.length;i++){
    const ch=FONT[str[i]]||FONT[' '],rows=ch.split(';');
    for(let r=0;r<5;r++)for(let cc=0;cc<3;cc++)if(rows[r][cc]==='1')ctx.fillRect(x+i*4+cc,y+r,1,1);
  }
}

const SAVE_KEY='lores-hack-v1';

function hasSave(){return!!localStorage.getItem(SAVE_KEY);}

function getSaveLabel(){
  try{
    const d=JSON.parse(localStorage.getItem(SAVE_KEY));
    const hp=d.players.find(p=>p.isHuman);
    return'↩ DEPTH '+d.stage+' / LV'+( hp?hp.level:1)+' / KILLS '+d.totalKills;
  }catch(e){return'';}
}

function saveGame(){
  const data={
    v:1,stage,totalKills,
    cfg:{cpus:cfg.cpus,slots:[...cfg.slots]},
    players:players.map(p=>({
      idx:p.idx,hp:p.hp,maxHp:p.maxHp,
      level:p.level,xp:p.xp,
      weapon:{...p.weapon},
      isHuman:p.isHuman,alive:p.alive,hasRevive:p.hasRevive,
      ctrlType:p.isHuman?(cfg.slots[0]||'KB+M'):'CPU',
      personality:p.isHuman?null:p.controller.personality,
      accXp:p.accXp,kills:p.kills
    }))
  };
  localStorage.setItem(SAVE_KEY,JSON.stringify(data));
}

function clearSave(){localStorage.removeItem(SAVE_KEY);}

function loadGame(){
  const raw=localStorage.getItem(SAVE_KEY);
  if(!raw)return false;
  let data;
  try{data=JSON.parse(raw);}catch(e){clearSave();return false;}
  if(data.v!==1){clearSave();return false;}

  // Restore cfg
  cfg.cpus=data.cfg.cpus;cfg.slots=data.cfg.slots;
  renderLobby();

  // Rebuild players from saved snapshot
  players=[];
  for(const pd of data.players){
    const ctrl=pd.isHuman
      ?(pd.ctrlType==='GAMEPAD'?new PadController():new KMController())
      :new CPUController(pd.personality);
    const p=makePlayer(pd.idx,ctrl,pd.isHuman);
    p.hp=pd.hp;p.maxHp=pd.maxHp;
    p.level=pd.level;p.xp=pd.xp;
    p.hasRevive=pd.hasRevive||false;
    p.weapon={...pd.weapon};
    p.alive=pd.alive;p.accXp=pd.accXp;p.kills=pd.kills;
    players.push(p);
  }

  stage=data.stage;totalKills=data.totalKills;gameWon=false;
  monsterHouse=false;monsterHouseCleared=false;mhSpawnPending=0;
  bullets=[];ebullets=[];enemies=[];particles=[];pickups=[];messages=[];
  bulletTime=null;
  running=true;PSG.play(stage);
  cv.classList.toggle('cur',!players.some(p=>p.isHuman&&p.controller.type==='KB+M'));
  genMap();spawnT=.5;
  let cx=0,cy=0,n=0;for(const p of players){if(!p.alive)continue;cx+=p.x;cy+=p.y;n++;}
  if(n){camX=cx/n;camY=cy/n;}
  // Restore zombies for dead CPU players
  for(const p of players){
    if(!p.alive&&!p.isHuman){
      const zm=makeZombie(p);
      // Spawn near map center, away from living players
      for(let t=0;t<200;t++){
        const tx=rndi(3,MAPW-3),ty=rndi(3,MAPH-3);
        if(map[ty*MAPW+tx]!==0&&map[ty*MAPW+tx]!==2)continue;
        let minD=Infinity;
        for(const lp of players){if(!lp.alive)continue;const d=Math.hypot(lp.x-(tx*TILE+8),lp.y-(ty*TILE+8));if(d<minD)minD=d;}
        if(minD>80){zm.x=tx*TILE+8;zm.y=ty*TILE+8;break;}
      }
      enemies.push(zm);
    }
  }
  lobbyEl.style.display='none';gameOverState=false;
  flash('DEPTH '+stage+' — RESUMED','#0f8');
  return true;
}

function _audioToWav(buffer){
  const nCh=buffer.numberOfChannels,sr=buffer.sampleRate,ns=buffer.length;
  const ab=new ArrayBuffer(44+ns*nCh*2),v=new DataView(ab);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
  ws(0,'RIFF');v.setUint32(4,36+ns*nCh*2,true);ws(8,'WAVE');
  ws(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);
  v.setUint16(22,nCh,true);v.setUint32(24,sr,true);
  v.setUint32(28,sr*nCh*2,true);v.setUint16(32,nCh*2,true);v.setUint16(34,16,true);
  ws(36,'data');v.setUint32(40,ns*nCh*2,true);
  let off=44;
  for(let i=0;i<ns;i++)for(let c=0;c<nCh;c++){
    const s=Math.max(-1,Math.min(1,buffer.getChannelData(c)[i]));
    v.setInt16(off,s*0x7FFF,true);off+=2;
  }
  return ab;
}

const SE=(()=>{
  let ac;
  function ctx(){return ac||(ac=new(window.AudioContext||window.webkitAudioContext)());}
  function clang(){
    // Metallic resonance — secret wall hit
    const c=ctx(),t=c.currentTime;
    const osc=c.createOscillator(),gain=c.createGain();
    osc.connect(gain);gain.connect(c.destination);
    osc.type='triangle';
    osc.frequency.setValueAtTime(1320,t);
    osc.frequency.exponentialRampToValueAtTime(330,t+.35);
    gain.gain.setValueAtTime(.25,t);gain.gain.exponentialRampToValueAtTime(.001,t+.4);
    osc.start(t);osc.stop(t+.4);
  }
  function driver(){
    // Pickup jingle — driver acquired
    const c=ctx(),t=c.currentTime;
    [440,550,660,880].forEach((hz,i)=>{
      const osc=c.createOscillator(),gain=c.createGain();
      osc.connect(gain);gain.connect(c.destination);
      osc.type='square';
      osc.frequency.value=hz;
      const s=t+i*.07;
      gain.gain.setValueAtTime(.12,s);gain.gain.exponentialRampToValueAtTime(.001,s+.18);
      osc.start(s);osc.stop(s+.18);
    });
  }
  return{clang,driver};
})();

// ═══════════════════════════════════════════════
//  PSG MUSIC ENGINE  (Web Audio API / AY-3-8910 style)
// ═══════════════════════════════════════════════
const PSG=(()=>{
  let AC,mGain,dNode,dGain,seqId,nextT,step,pat,bpm;
  const CLK=1750000; // AY-3-8910 master clock

  // Deterministic LCG seeded per stage
  function rng(seed){
    let s=(seed*1664525+1013904223)>>>0;
    return()=>{s=(s*1664525+1013904223)>>>0;return s/0x100000000;};
  }

  // Quantize to real PSG frequency steps (removes "clean" digital sound)
  function pf(hz){const n=Math.max(1,Math.round(CLK/(16*hz)));return CLK/(16*n);}
  function midi(n){return pf(440*Math.pow(2,(n-69)/12));}

  // Depth zones — scale, root MIDI, base BPM
  // D01-20: major               → bright and clear
  // D21-40: mixolydian          → major feel, slight edge (b7)
  // D41-60: dorian              → minor but not oppressive (raised 6th)
  // D61-80: natural minor       → tension building
  // D81-100: phrygian           → dark, but not locrian-level horror
  const ZONES=[
    {sc:[0,2,4,5,7,9,11],root:50,bpmBase:82},
    {sc:[0,2,4,5,7,9,10], root:48,bpmBase:98},
    {sc:[0,2,3,5,7,9,10], root:46,bpmBase:116},
    {sc:[0,2,3,5,7,8,10], root:44,bpmBase:136},
    {sc:[0,1,3,5,7,8,10], root:42,bpmBase:156},
  ];
  function zone(st){return ZONES[Math.min(4,Math.floor((st-1)/20))];}

  // Generate 8 or 16-step pattern seeded from stage
  // Boss pattern — aggressive, 16-step, diminished-dominant flavour
  function genBossPat(st){
    const r=rng(st*3571+99991);
    // Double harmonic / diminished feel: root, b2, 3, b5, 5, b7
    const sc=[0,1,4,6,7,10];
    // Root drops deeper with each boss floor
    const rt=36+((st/10)|0)%4*(-2);
    const mel=[],bass=[],arp=[];
    for(let i=0;i<16;i++){
      // Punchy melody: mostly on-beat, occasional rests
      mel.push(r()<0.18?null:rt+sc[Math.floor(r()*sc.length)]+(r()<0.35?12:0)+24);
      // Driving bass on every beat (every 4 8th-steps), occasional 5th
      bass.push(i%4===0?rt+12:i%4===2?rt+7+12:null);
      // Fast frantic arpeggio always on (16th-note feel)
      arp.push(rt+sc[i%sc.length]+(i%3===0?24:12));
    }
    return{mel,bass,arp,len:16};
  }

  function genPat(st){
    const r=rng(st*7919+31337);
    const z=zone(st);
    const sc=z.sc,rt=z.root;
    const deep=st>=61;
    const len=deep?16:8;
    const mel=[],bass=[],arp=[];
    for(let i=0;i<len;i++){
      // Melody: ~25% rest, otherwise random scale degree, occasional +1 octave
      mel.push(r()<0.30?null:rt+sc[Math.floor(r()*sc.length)]+(r()<0.40?12:0)+24);
      // Bass: root on beat1, 5th on beat3
      const fifth=sc[sc.length>4?4:sc.length-1];
      bass.push(i%len===0?rt+12:i%4===2?rt+fifth+12:null);
      // Arpeggio texture only D61+ (frantic upper channel)
      arp.push(deep?rt+sc[i%sc.length]+(i%2?12:24):null);
    }
    return{mel,bass,arp,len};
  }

  function init(){
    if(AC)return;
    AC=new(window.AudioContext||window.webkitAudioContext)();
    mGain=AC.createGain();mGain.gain.value=0.20;
    // Subtle delay echo (dungeon reverb feel)
    dNode=AC.createDelay(1);dNode.delayTime.value=0.20;
    dGain=AC.createGain();dGain.gain.value=0.25;
    mGain.connect(AC.destination);
    mGain.connect(dNode);dNode.connect(dGain);dGain.connect(AC.destination);
  }

  // Square/triangle note with hard PSG-style envelope
  function noteOn(hz,type,vol,t,dur){
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=type;o.frequency.value=hz;
    g.gain.setValueAtTime(vol,t);
    g.gain.setValueAtTime(vol*.55,t+dur*.55);
    g.gain.setValueAtTime(0.0001,t+dur*.92);
    o.connect(g);g.connect(mGain);
    o.start(t);o.stop(t+dur+.02);
  }

  // Band-pass filtered noise (kick / snare / hi-hat)
  function noiseOn(freq,vol,t,dur){
    const sz=Math.ceil(AC.sampleRate*.04),buf=AC.createBuffer(1,sz,AC.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<sz;i++)d[i]=Math.random()*2-1;
    const src=AC.createBufferSource();src.buffer=buf;src.loop=true;
    const flt=AC.createBiquadFilter();flt.type='bandpass';flt.frequency.value=freq;flt.Q.value=.9;
    const g=AC.createGain();
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    src.connect(flt);flt.connect(g);g.connect(mGain);
    src.start(t);src.stop(t+dur+.01);
  }

  function sched(){
    const sd=60/bpm/2; // 8th-note duration in seconds
    while(nextT<AC.currentTime+.18){
      const i=step%pat.len;
      if(pat.mel[i]!==null) noteOn(midi(pat.mel[i]),'square',.15,nextT,sd*.72);
      if(pat.bass[i]!==null) noteOn(midi(pat.bass[i]),'triangle',.21,nextT,sd*1.45);
      if(pat.arp[i]!==null) noteOn(midi(pat.arp[i]),'square',.07,nextT,sd*.32);
      if(i%8===0) noiseOn(100,.11,nextT,.08);   // kick
      if(i%4===2) noiseOn(1100,.05,nextT,.035); // snare
      if(i%2===0) noiseOn(5000,.025,nextT,.02); // hi-hat
      step++;nextT+=sd;
    }
  }

  return{
    play(st){
      this.stop();init();
      if(AC.state==='suspended')AC.resume();
      const z=zone(st);
      bpm=z.bpmBase+(st%20)*.55; // gentle BPM drift within each zone
      pat=genPat(st);step=0;nextT=AC.currentTime+.06;
      seqId=setInterval(sched,25);
    },
    stop(){if(seqId){clearInterval(seqId);seqId=null;}},
    resume(){if(AC&&AC.state==='suspended')AC.resume();},
    boss(st){
      this.stop();init();
      if(AC.state==='suspended')AC.resume();
      bpm=172+(st%10)*.8; // fast & slightly varies per boss floor
      pat=genBossPat(st);step=0;nextT=AC.currentTime+.06;
      seqId=setInterval(()=>{
        const sd=60/bpm/2;
        while(nextT<AC.currentTime+.18){
          const i=step%pat.len;
          if(pat.mel[i]!==null) noteOn(midi(pat.mel[i]),'square',.18,nextT,sd*.55);
          if(pat.bass[i]!==null) noteOn(midi(pat.bass[i]),'sawtooth',.26,nextT,sd*1.1);
          if(pat.arp[i]!==null) noteOn(midi(pat.arp[i]),'square',.09,nextT,sd*.25);
          // Heavy beat: kick every beat, snare every off-beat, hi-hat every step
          if(i%4===0) noiseOn(80,.18,nextT,.12);   // heavy kick
          if(i%4===2) noiseOn(900,.12,nextT,.06);  // snare
          noiseOn(6000,.04,nextT,.015);             // hi-hat every 8th
          step++;nextT+=sd;
        }
      },22);
    },
    // Offline render — returns Promise<AudioBuffer>
    async render(stage,duration=62){
      const SR=44100;
      const oAC=new OfflineAudioContext(2,SR*duration,SR);
      const oG=oAC.createGain();oG.gain.value=0.20;
      const oDly=oAC.createDelay(1);oDly.delayTime.value=0.20;
      const oDlyG=oAC.createGain();oDlyG.gain.value=0.25;
      oG.connect(oAC.destination);oG.connect(oDly);oDly.connect(oDlyG);oDlyG.connect(oAC.destination);
      function no(hz,type,vol,t,dur){
        const o=oAC.createOscillator(),g=oAC.createGain();
        o.type=type;o.frequency.value=hz;
        g.gain.setValueAtTime(vol,t);g.gain.setValueAtTime(vol*.55,t+dur*.55);
        g.gain.setValueAtTime(0.0001,t+dur*.92);
        o.connect(g);g.connect(oG);o.start(t);o.stop(t+dur+.02);
      }
      function nn(freq,vol,t,dur){
        const sz=Math.ceil(SR*.04),nb=oAC.createBuffer(1,sz,SR);
        const d=nb.getChannelData(0);for(let i=0;i<sz;i++)d[i]=Math.random()*2-1;
        const src=oAC.createBufferSource();src.buffer=nb;src.loop=true;
        const flt=oAC.createBiquadFilter();flt.type='bandpass';flt.frequency.value=freq;flt.Q.value=.9;
        const g=oAC.createGain();
        g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.0001,t+dur);
        src.connect(flt);flt.connect(g);g.connect(oG);src.start(t);src.stop(t+dur+.01);
      }
      const z=zone(stage);
      const lbpm=z.bpmBase+(stage%20)*.55,lpat=genPat(stage);
      const sd=60/lbpm/2;
      let t=.02,st2=0;
      while(t<duration-sd){
        const i=st2%lpat.len;
        if(lpat.mel[i]!==null)no(midi(lpat.mel[i]),'square',.15,t,sd*.72);
        if(lpat.bass[i]!==null)no(midi(lpat.bass[i]),'triangle',.21,t,sd*1.45);
        if(lpat.arp[i]!==null)no(midi(lpat.arp[i]),'square',.07,t,sd*.32);
        if(i%8===0)nn(100,.11,t,.08);
        if(i%4===2)nn(1100,.05,t,.035);
        if(i%2===0)nn(5000,.025,t,.02);
        st2++;t+=sd;
      }
      return oAC.startRendering();
    }
  };
})();

//  GAME LIFECYCLE

function startGame(){
  // Build players
  players=[];
  const total=1+cfg.cpus; // always 1 human + N CPU
  for(let i=0;i<total;i++){
    let ctrl,isHuman=i===0;
    if(isHuman){
      const slot=cfg.slots[0]||'KB+M';
      ctrl=slot==='GAMEPAD'?new PadController():new KMController();
    }else ctrl=new CPUController(randPers());
    players.push(makePlayer(i,ctrl,isHuman));
  }
  // Roulette animation for Moody CPUs, instant reveal for others
  for(const p of players){
    if(p.isHuman)continue;
    if(p.controller.personality==='moody'){
      p.controller._rouletteDisplay='????';
      const labels=PERS_LIST.filter(x=>x!=='moody').map(x=>PERS_LABEL[x]);
      let tick=0,delay=60;
      const totalTicks=18+Math.floor(Math.random()*8);
      (function spin(){
        p.controller._rouletteDisplay=labels[tick%labels.length];
        tick++;
        if(tick<totalTicks){
          delay=Math.min(260,delay*1.18|0);
          setTimeout(spin,delay);
        }else{
          p.controller._rouletteDisplay=null;
          flash(p.pal.name+': MOODY→'+p.controller.ability,p.pal.body);
        }
      })();
    }else{
      flash(p.pal.name+': '+PERS_LABEL[p.controller.personality],p.pal.body);
    }
  }

  stage=1;totalKills=0;gameWon=false;gameOverState=false;
  monsterHouse=false;monsterHouseCleared=false;mhSpawnPending=0;
  bullets=[];ebullets=[];enemies=[];particles=[];pickups=[];messages=[];
  bulletTime=null;
  paused=false;
  running=true;PSG.play(1);
  cv.classList.toggle('cur',!players.some(p=>p.isHuman&&p.controller.type==='KB+M'));
  genMap();spawnT=.5;
  let cx=0,cy=0,n=0;for(const p of players){cx+=p.x;cy+=p.y;n++;}camX=cx/n;camY=cy/n;
  lobbyEl.style.display='none';
}

// ── Pause overlay (canvas-rendered) ──────────
const pauseBtns={};
function pBtnPri(key,label,x,y,w,h,col){
