<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>DEPTH 100</title>
<style>
  html,body{margin:0;padding:0;background:#0a0a10;overflow:hidden;height:100%;
    font-family:"Courier New",monospace;user-select:none;-webkit-user-select:none;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;background:#000;cursor:none;
    box-shadow:0 0 60px #0ff3,inset 0 0 0 2px #111;}
  canvas.cur{cursor:default;}

  /* ── Lobby (canvas-rendered, div is show/hide flag only) ── */
  #lobby{position:fixed;inset:0;pointer-events:none;z-index:10;}

  /* ── Bullet time overlay ─────────────── */
  #btOv{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    flex-direction:column;z-index:8;pointer-events:none;}
  #btName{font-size:36px;letter-spacing:6px;text-shadow:0 0 20px;margin-bottom:6px;}
  #btCount{font-size:56px;letter-spacing:0;text-shadow:0 0 28px currentColor;}
  #btSub{font-size:13px;letter-spacing:4px;color:#f44;margin-top:8px;}

  /* ── Game over / Win ─────────────────── */
  #over,#win{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    flex-direction:column;background:#000c;z-index:9;text-align:center;}
  #over h2{font-size:32px;color:#f44;margin:0;letter-spacing:6px;text-shadow:0 0 14px #f00;}
  #win h2{font-size:28px;color:#ff0;margin:0;letter-spacing:5px;text-shadow:0 0 18px #ff0,0 0 40px #fa0;}
  #over p,#win p{color:#fda;letter-spacing:2px;font-size:12px;margin:6px 0;}
  #over button,#win button{margin-top:16px;background:#200;color:#f88;border:2px solid #f44;
    padding:8px 22px;font-family:inherit;cursor:pointer;letter-spacing:3px;font-size:13px;}
  #win button{background:#220;color:#ff8;border-color:#ff0;}
</style>
</head>
<body>
<div id="wrap"><canvas id="cv" width="320" height="180"></canvas></div>

<!-- Lobby -->
<div id="lobby"></div>

<!-- Bullet time overlay -->
<div id="btOv">
  <div id="btName">P2 DIED!</div>
  <div id="btCount">3</div>
  <div id="btSub">BRACE FOR ZOMBIE</div>
</div>

<!-- Pause -->
<div id="pause" style="display:none;position:fixed;inset:0;pointer-events:none;"></div>

<!-- Game over -->
<div id="over">
  <h2 id="ovTitle">YOU DIED</h2>
  <p id="ovSub"></p>
  <button id="retryBtn">RETRY</button>
</div>

<!-- Win -->
<div id="win">
  <h2>THE SCREW IS YOURS</h2>
  <p>DEPTH 100 CLEARED</p>
  <p id="winStat"></p>
  <button id="winBtn">PLAY AGAIN</button>
</div>

<!-- SCRIPTS -->
</body>
</html>
